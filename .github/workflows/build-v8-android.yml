name: Build XScriptV8 Android AAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "V8 version"
        required: true
        default: "15.1.44"

  push:
    tags:
      - "aar-v*"

jobs:
  build:
    name: Build V8 Android AAR
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config zip

      - name: Build AAR
        run: |
          chmod +x scripts/build-v8-android.sh
          ./scripts/build-v8-android.sh ${{ github.event.inputs.version || '15.1.44' }}

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: XScriptV8-AAR
          path: artifacts/v8-android/XScriptV8.aar

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/aar-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/v8-android/XScriptV8.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
