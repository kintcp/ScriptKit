name: Build X.Script.V8 Android AAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "V8 version (tag or branch)"
        required: true
        default: "15.1.44"

  push:
    tags:
      - "aar-v*"

env:
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  build-v8-libs:
    name: Build V8 for ${{ matrix.android_abi }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_cpu: arm
            android_abi: armeabi-v7a
          - target_cpu: arm64
            android_abi: arm64-v8a
          - target_cpu: x86
            android_abi: x86
          - target_cpu: x64
            android_abi: x86_64

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config zip

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: v8-android-build/depot_tools
          key: depot-tools-android-${{ runner.os }}-v1

      - name: Build Library
        run: |
          chmod +x scripts/build-v8-android.sh
          ./scripts/build-v8-android.sh ${{ github.event.inputs.version || '15.1.44' }} ${{ matrix.target_cpu }} ${{ matrix.android_abi }}

      - name: Upload Library Artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-lib-${{ matrix.android_abi }}
          path: artifacts/v8-android/libs/${{ matrix.android_abi }}/libv8.a

      - name: Upload Headers Artifact
        if: matrix.target_cpu == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: v8-headers
          path: artifacts/v8-android/include/

  bundle-aar:
    name: Bundle V8 Android AAR
    needs: build-v8-libs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Download all libraries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/v8-android/libs-raw/
          pattern: v8-lib-*

      - name: Download headers
        uses: actions/download-artifact@v4
        with:
          name: v8-headers
          path: artifacts/v8-android/include/

      - name: Bundle AAR
        run: |
          mkdir -p artifacts/v8-android/libs/armeabi-v7a
          mkdir -p artifacts/v8-android/libs/arm64-v8a
          mkdir -p artifacts/v8-android/libs/x86
          mkdir -p artifacts/v8-android/libs/x86_64
          
          cp artifacts/v8-android/libs-raw/v8-lib-armeabi-v7a/libv8.a artifacts/v8-android/libs/armeabi-v7a/
          cp artifacts/v8-android/libs-raw/v8-lib-arm64-v8a/libv8.a artifacts/v8-android/libs/arm64-v8a/
          cp artifacts/v8-android/libs-raw/v8-lib-x86/libv8.a artifacts/v8-android/libs/x86/
          cp artifacts/v8-android/libs-raw/v8-lib-x86_64/libv8.a artifacts/v8-android/libs/x86_64/

          chmod +x scripts/build-v8-android.sh
          ./scripts/build-v8-android.sh ${{ github.event.inputs.version || '15.1.44' }} bundle

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-AAR
          path: artifacts/v8-android/X.Script.V8.aar

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/aar-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/v8-android/X.Script.V8.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Repo (Local)
        if: startsWith(github.ref, 'refs/tags/aar-v')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#aar-v}
          chmod +x scripts/publish-maven.sh
          ./scripts/publish-maven.sh X.Script.V8 "$VERSION" artifacts/v8-android/X.Script.V8.aar

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/aar-v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: maven-repo
          clean: false # Don't delete existing versions in the repo
