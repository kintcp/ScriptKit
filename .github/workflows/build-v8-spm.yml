name: Build XScriptV8 SPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: "V8 version"
        required: true
        default: "15.1.44"

  push:
    tags:
      - "spm-v*"

jobs:
  build:
    name: Build V8 Apple XCFramework
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build XCFramework
        run: |
          chmod +x scripts/build-v8-apple.sh
          ./scripts/build-v8-apple.sh ${{ github.event.inputs.version || '15.1.44' }}

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: XScriptV8-XCFramework
          path: artifacts/v8-spm/XScriptV8.xcframework

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/spm-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/v8-spm/XScriptV8.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Note: For production use, you should zip the xcframework and host it somewhere,
    # then update Package.swift to use a remote binaryTarget with a checksum.
    # For now, this builds it and makes it available.
