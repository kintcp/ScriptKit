name: Build X.Script.V8 SPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: "V8 version"
        required: true
        default: "15.1.44"

  push:
    tags:
      - "spm-v*"

jobs:
  build-v8-libs:
    name: Build V8 for ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: x64
            jit: true
          - platform: macos
            arch: arm64
            jit: true
          - platform: ios
            arch: arm64
            jit: false
          - platform: ios-simulator
            arch: x64
            jit: false
          - platform: ios-simulator
            arch: arm64
            jit: false
          - platform: tvos
            arch: arm64
            jit: false
          - platform: tvos-simulator
            arch: x64
            jit: false
          - platform: tvos-simulator
            arch: arm64
            jit: false
          - platform: visionos
            arch: arm64
            jit: false
          - platform: visionos-simulator
            arch: arm64
            jit: false

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: v8-apple-build/depot_tools
          key: depot-tools-apple-${{ runner.os }}-v1

      - name: Build Library
        run: |
          chmod +x scripts/build-v8-apple.sh
          ./scripts/build-v8-apple.sh ${{ github.event.inputs.version || '15.1.44' }} ${{ matrix.platform }} ${{ matrix.arch }} ${{ matrix.jit }}

      - name: Upload Library Artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/v8-spm/libs/${{ matrix.platform }}/${{ matrix.arch }}/v8_monolith.a

      - name: Upload Headers Artifact
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: v8-headers-apple
          path: artifacts/v8-spm/include/

  bundle-xcframework:
    name: Bundle V8 Apple XCFramework
    needs: build-v8-libs
    runs-on: macos-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Download all libraries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/v8-spm/libs-raw/
          pattern: v8-lib-*

      - name: Download headers
        uses: actions/download-artifact@v4
        with:
          name: v8-headers-apple
          path: artifacts/v8-spm/include/

      - name: Bundle XCFramework
        run: |
          mkdir -p artifacts/v8-spm/libs/macos/x64
          mkdir -p artifacts/v8-spm/libs/macos/arm64
          mkdir -p artifacts/v8-spm/libs/ios/arm64
          mkdir -p artifacts/v8-spm/libs/ios-simulator/x64
          mkdir -p artifacts/v8-spm/libs/ios-simulator/arm64
          mkdir -p artifacts/v8-spm/libs/tvos/arm64
          mkdir -p artifacts/v8-spm/libs/tvos-simulator/x64
          mkdir -p artifacts/v8-spm/libs/tvos-simulator/arm64
          mkdir -p artifacts/v8-spm/libs/visionos/arm64
          mkdir -p artifacts/v8-spm/libs/visionos-simulator/arm64
          
          cp artifacts/v8-spm/libs-raw/v8-lib-macos-x64/v8_monolith.a artifacts/v8-spm/libs/macos/x64/
          cp artifacts/v8-spm/libs-raw/v8-lib-macos-arm64/v8_monolith.a artifacts/v8-spm/libs/macos/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-ios-arm64/v8_monolith.a artifacts/v8-spm/libs/ios/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-ios-simulator-x64/v8_monolith.a artifacts/v8-spm/libs/ios-simulator/x64/
          cp artifacts/v8-spm/libs-raw/v8-lib-ios-simulator-arm64/v8_monolith.a artifacts/v8-spm/libs/ios-simulator/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-tvos-arm64/v8_monolith.a artifacts/v8-spm/libs/tvos/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-tvos-simulator-x64/v8_monolith.a artifacts/v8-spm/libs/tvos-simulator/x64/
          cp artifacts/v8-spm/libs-raw/v8-lib-tvos-simulator-arm64/v8_monolith.a artifacts/v8-spm/libs/tvos-simulator/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-visionos-arm64/v8_monolith.a artifacts/v8-spm/libs/visionos/arm64/
          cp artifacts/v8-spm/libs-raw/v8-lib-visionos-simulator-arm64/v8_monolith.a artifacts/v8-spm/libs/visionos-simulator/arm64/

          chmod +x scripts/build-v8-apple.sh
          ./scripts/build-v8-apple.sh ${{ github.event.inputs.version || '15.1.44' }} bundle

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-XCFramework
          path: artifacts/v8-spm/X.Script.V8.xcframework

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/spm-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/v8-spm/X.Script.V8.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift
        if: startsWith(github.ref, 'refs/tags/spm-v')
        run: |
          CHECKSUM=$(swift package compute-checksum artifacts/v8-spm/X.Script.V8.xcframework.zip)
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/X.Script.V8.xcframework.zip"
          
          python3 -c "
          import re
          with open('Package.swift', 'r') as f: content = f.read()
          pattern = r'(\.binaryTarget\(\s*name:\s*\"X\.Script\.V8\",\s*)(?:path|url):.*?\)'
          replacement = r'\1url: \"$URL\",\n            checksum: \"$CHECKSUM\")'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open('Package.swift', 'w') as f: f.write(content)
          "
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          # Apply the change again on main branch
          python3 -c "
          import re
          with open('Package.swift', 'r') as f: content = f.read()
          pattern = r'(\.binaryTarget\(\s*name:\s*\"X\.Script\.V8\",\s*)(?:path|url):.*?\)'
          replacement = r'\1url: \"$URL\",\n            checksum: \"$CHECKSUM\")'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open('Package.swift', 'w') as f: f.write(content)
          "
          git add Package.swift
          git commit -m "chore: update X.Script.V8 checksum for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
