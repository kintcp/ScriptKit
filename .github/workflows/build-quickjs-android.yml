name: Build X.Script.QuickJS Android AAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "QuickJS git ref, tag, branch, or commit"
        required: true
        default: "master"

  push:
    tags:
      - "quickjs-aar-v*"

jobs:
  build:
    name: Build QuickJS Android AAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build AAR
        run: |
          chmod +x scripts/build-quickjs-android.sh
          ./scripts/build-quickjs-android.sh ${{ github.event.inputs.version || 'master' }}

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.QuickJS-AAR
          path: artifacts/quickjs-android/X.Script.QuickJS.aar

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/quickjs-aar-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/quickjs-android/X.Script.QuickJS.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Repo (Local)
        if: startsWith(github.ref, 'refs/tags/quickjs-aar-v')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#quickjs-aar-v}
          chmod +x scripts/publish-maven.sh
          ./scripts/publish-maven.sh X.Script.QuickJS "$VERSION" artifacts/quickjs-android/X.Script.QuickJS.aar

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/quickjs-aar-v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: maven-repo
          clean: false # Don't delete existing versions in the repo
