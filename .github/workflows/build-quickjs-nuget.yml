name: Build ScriptKit.QuickJS NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "2026.6.5"
      quickjs_ref:
        description: "QuickJS git ref, tag, branch, or commit"
        required: true
        default: "master"
      llvm_mingw_version:
        description: "llvm-mingw release tag"
        required: true
        default: "20260616"
      publish:
        description: "Publish to NuGet.org"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "quickjs-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build QuickJS Windows x64/ARM64 NuGet
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.resolve.outputs.version }}

    env:
      PACKAGE_ID: X.Script.QuickJS
      QUICKJS_REPO: https://github.com/bellard/quickjs.git

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Resolve version and refs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            QUICKJS_REF="${{ github.event.inputs.quickjs_ref }}"
            LLVM_MINGW_VERSION="${{ github.event.inputs.llvm_mingw_version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#quickjs-v}"
            QUICKJS_REF="master"
            LLVM_MINGW_VERSION="20260616"
          fi

          OUT_DIR="$(realpath -m artifacts/quickjs-nuget)"
          WORK_DIR="$OUT_DIR/work"
          QUICKJS_SOURCE_DIR="$WORK_DIR/quickjs"
          LLVM_MINGW_DIR="$WORK_DIR/llvm-mingw"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "QUICKJS_REF=$QUICKJS_REF" >> "$GITHUB_ENV"
          echo "LLVM_MINGW_VERSION=$LLVM_MINGW_VERSION" >> "$GITHUB_ENV"
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
          echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
          echo "QUICKJS_SOURCE_DIR=$QUICKJS_SOURCE_DIR" >> "$GITHUB_ENV"
          echo "LLVM_MINGW_DIR=$LLVM_MINGW_DIR" >> "$GITHUB_ENV"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "VERSION=$VERSION"
          echo "QUICKJS_REF=$QUICKJS_REF"
          echo "LLVM_MINGW_VERSION=$LLVM_MINGW_VERSION"
          echo "OUT_DIR=$OUT_DIR"
          echo "WORK_DIR=$WORK_DIR"
          echo "QUICKJS_SOURCE_DIR=$QUICKJS_SOURCE_DIR"
          echo "LLVM_MINGW_DIR=$LLVM_MINGW_DIR"

      - name: Install base tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            xz-utils \
            zip \
            unzip \
            file

      - name: Install LLVM-MinGW
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$LLVM_MINGW_DIR"
          mkdir -p "$WORK_DIR" "$LLVM_MINGW_DIR"

          DISTRO="ubuntu-22.04-$(uname -m)"
          ARCHIVE="llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-${DISTRO}.tar.xz"
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/${ARCHIVE}"

          echo "Downloading: $URL"
          curl -L --fail --retry 3 -o "$WORK_DIR/$ARCHIVE" "$URL"

          tar -xJf "$WORK_DIR/$ARCHIVE" -C "$LLVM_MINGW_DIR" --strip-components=1

          echo "$LLVM_MINGW_DIR/bin" >> "$GITHUB_PATH"

          "$LLVM_MINGW_DIR/bin/x86_64-w64-mingw32-clang" --version
          "$LLVM_MINGW_DIR/bin/aarch64-w64-mingw32-clang" --version
          "$LLVM_MINGW_DIR/bin/llvm-readobj" --version

      - name: Clone official QuickJS
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$QUICKJS_SOURCE_DIR"
          mkdir -p "$WORK_DIR"

          git clone --depth 1 --branch "$QUICKJS_REF" "$QUICKJS_REPO" "$QUICKJS_SOURCE_DIR" || {
            echo "Shallow clone failed. Trying full clone and checkout..."
            rm -rf "$QUICKJS_SOURCE_DIR"
            git clone "$QUICKJS_REPO" "$QUICKJS_SOURCE_DIR"
            cd "$QUICKJS_SOURCE_DIR"
            git checkout "$QUICKJS_REF"
          }

          cd "$QUICKJS_SOURCE_DIR"

          echo "QuickJS commit:"
          git rev-parse HEAD
          git log -1 --oneline

          echo "CONFIG_ATOMICS usage:"
          grep -n "CONFIG_ATOMICS" quickjs.c || true

      - name: Validate QuickJS source files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            quickjs.c
            quickjs.h
            cutils.c
            cutils.h
            libregexp.c
            libregexp.h
            libunicode.c
            libunicode.h
            dtoa.c
            list.h
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$QUICKJS_SOURCE_DIR/$file" ]; then
              echo "Missing QuickJS file: $QUICKJS_SOURCE_DIR/$file"
              exit 1
            fi
          done

      - name: Build QuickJS DLL and import libraries
        shell: bash
        run: |
          set -euo pipefail

          SRC_DIR="$QUICKJS_SOURCE_DIR"
          BUILD_ROOT="$WORK_DIR/build"
          PKG_ROOT="$WORK_DIR/package"

          INCLUDE_DIR="$PKG_ROOT/build/native/include"

          DLL_NAME="$PACKAGE_ID.dll"
          LIB_NAME="$PACKAGE_ID.lib"
          DEF_NAME="$PACKAGE_ID.def"
          GNU_IMPLIB_NAME="lib$PACKAGE_ID.dll.a"
          STATIC_A_NAME="lib$PACKAGE_ID.a"

          rm -rf "$BUILD_ROOT" "$PKG_ROOT"
          mkdir -p "$BUILD_ROOT" "$INCLUDE_DIR"

          echo "Copying headers..."

          header_files=(
            quickjs.h
            cutils.h
            libregexp.h
            libunicode.h
            list.h
          )

          for header in "${header_files[@]}"; do
            if [ -f "$SRC_DIR/$header" ]; then
              cp "$SRC_DIR/$header" "$INCLUDE_DIR/$header"
            fi
          done

          sources=(
            quickjs.c
            cutils.c
            libregexp.c
            libunicode.c
            dtoa.c
          )

          build_one() {
            local rid="$1"
            local triple="$2"
            local dlltool_machine="$3"
            local expected_machine="$4"

            local cc="$LLVM_MINGW_DIR/bin/${triple}-clang"
            local ar="$LLVM_MINGW_DIR/bin/${triple}-ar"
            local strip="$LLVM_MINGW_DIR/bin/${triple}-strip"
            local dlltool="$LLVM_MINGW_DIR/bin/llvm-dlltool"
            local readobj="$LLVM_MINGW_DIR/bin/llvm-readobj"

            local build_dir="$BUILD_ROOT/$rid"
            local bin_dir="$PKG_ROOT/build/native/bin/$rid"
            local lib_dir="$PKG_ROOT/build/native/lib/$rid"
            local runtime_native_dir="$PKG_ROOT/runtimes/$rid/native"

            mkdir -p "$build_dir" "$bin_dir" "$lib_dir" "$runtime_native_dir"

            local cflags=(
              -O2
              -DNDEBUG
              -DCONFIG_WIN32
              "-DCONFIG_VERSION=\"$VERSION\""
              -D_GNU_SOURCE
              -I"$SRC_DIR"
              -Wall
              -Wextra
              -Wno-unused-parameter
              -Wno-missing-field-initializers
              -Wno-sign-compare
              -Wno-implicit-fallthrough
            )

            local objects=()

            echo "Compiling QuickJS objects for $rid with $triple..."

            for source in "${sources[@]}"; do
              local obj="$build_dir/${source%.c}.o"

              echo "  $source -> $obj"

              "$cc" \
                "${cflags[@]}" \
                -c "$SRC_DIR/$source" \
                -o "$obj"

              objects+=("$obj")
            done

            echo "Creating static LLVM-MinGW archive for $rid..."
            "$ar" rcs "$lib_dir/$STATIC_A_NAME" "${objects[@]}"

            echo "Resolving static winpthread for $rid..."
            local winpthread_static
            winpthread_static="$($cc -print-file-name=libwinpthread.a || true)"

            if [ -z "$winpthread_static" ] || [ ! -f "$winpthread_static" ]; then
              echo "Static libwinpthread.a not found for $rid."
              echo "Do not fall back to libwinpthread.dll.a here, otherwise runtime may load the wrong architecture libwinpthread-1.dll."
              exit 1
            fi

            echo "Using static winpthread: $winpthread_static"

            echo "Creating QuickJS DLL for $rid..."
            "$cc" \
              -shared \
              -o "$bin_dir/$DLL_NAME" \
              "${objects[@]}" \
              "$winpthread_static" \
              -Wl,--no-undefined \
              -Wl,--export-all-symbols \
              -Wl,--out-implib,"$lib_dir/$GNU_IMPLIB_NAME" \
              -Wl,--output-def,"$lib_dir/$DEF_NAME"

            "$strip" "$bin_dir/$DLL_NAME"

            echo "Copying runtime native DLL for $rid..."
            cp "$bin_dir/$DLL_NAME" "$runtime_native_dir/$DLL_NAME"

            echo "Checking PE machine for $rid..."
            "$readobj" --file-headers "$bin_dir/$DLL_NAME" | tee "$build_dir/headers.txt"
            grep -q "$expected_machine" "$build_dir/headers.txt"

            echo "Checking DLL imports for $rid..."
            "$readobj" --coff-imports "$bin_dir/$DLL_NAME" | tee "$build_dir/imports.txt" || true

            if grep -Eiq "libwinpthread-1\.dll" "$build_dir/imports.txt"; then
              echo "Unexpected dynamic libwinpthread-1.dll dependency found in $rid DLL."
              exit 1
            fi

            echo "Creating MSVC import library for $rid..."
            "$dlltool" \
              -m "$dlltool_machine" \
              -D "$DLL_NAME" \
              -d "$lib_dir/$DEF_NAME" \
              -l "$lib_dir/$LIB_NAME"

            echo "Built $rid files:"
            find \
              "$PKG_ROOT/build/native/bin/$rid" \
              "$PKG_ROOT/build/native/lib/$rid" \
              "$PKG_ROOT/runtimes/$rid/native" \
              -type f | sort

            file "$bin_dir/$DLL_NAME" || true
            file "$runtime_native_dir/$DLL_NAME" || true
          }

          build_one "win-x64" "x86_64-w64-mingw32" "i386:x86-64" "IMAGE_FILE_MACHINE_AMD64"
          build_one "win-arm64" "aarch64-w64-mingw32" "arm64" "IMAGE_FILE_MACHINE_ARM64"

          echo "Package files:"
          find "$PKG_ROOT" -type f | sort

      - name: Generate NuGet build files
        shell: bash
        run: |
          set -euo pipefail

          PKG_ROOT="$WORK_DIR/package"
          BUILD_NATIVE_DIR="$PKG_ROOT/build/native"

          mkdir -p "$BUILD_NATIVE_DIR"

          cat > "$BUILD_NATIVE_DIR/$PACKAGE_ID.props" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <Project>
            <ItemDefinitionGroup>
              <ClCompile>
                <AdditionalIncludeDirectories>\$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          EOF

          cat > "$BUILD_NATIVE_DIR/$PACKAGE_ID.targets" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <Project>
            <ItemDefinitionGroup Condition="'\$(Platform)' == 'x64'">
              <Link>
                <AdditionalLibraryDirectories>\$(MSBuildThisFileDirectory)lib\\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
                <AdditionalDependencies>$PACKAGE_ID.lib;%(AdditionalDependencies)</AdditionalDependencies>
              </Link>
            </ItemDefinitionGroup>

            <ItemGroup Condition="'\$(Platform)' == 'x64'">
              <None Include="\$(MSBuildThisFileDirectory)bin\\win-x64\\$PACKAGE_ID.dll">
                <Link>$PACKAGE_ID.dll</Link>
                <CopyToOutputDirectory>PreserveNewest</CopyToOutputDirectory>
              </None>
            </ItemGroup>

            <ItemDefinitionGroup Condition="'\$(Platform)' == 'ARM64'">
              <Link>
                <AdditionalLibraryDirectories>\$(MSBuildThisFileDirectory)lib\\win-arm64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
                <AdditionalDependencies>$PACKAGE_ID.lib;%(AdditionalDependencies)</AdditionalDependencies>
              </Link>
            </ItemDefinitionGroup>

            <ItemGroup Condition="'\$(Platform)' == 'ARM64'">
              <None Include="\$(MSBuildThisFileDirectory)bin\\win-arm64\\$PACKAGE_ID.dll">
                <Link>$PACKAGE_ID.dll</Link>
                <CopyToOutputDirectory>PreserveNewest</CopyToOutputDirectory>
              </None>
            </ItemGroup>
          </Project>
          EOF

          QUICKJS_COMMIT="$(cd "$QUICKJS_SOURCE_DIR" && git rev-parse HEAD)"

          cat > "$WORK_DIR/$PACKAGE_ID.nuspec" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <package>
            <metadata>
              <id>$PACKAGE_ID</id>
              <version>$VERSION</version>
              <authors>X</authors>
              <owners>X</owners>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>QuickJS native Windows x64 and ARM64 libraries built from the official repository with LLVM-MinGW.</description>
              <tags>quickjs native llvm-mingw mingw win-x64 win-arm64 javascript</tags>
              <repository type="git" url="$QUICKJS_REPO" commit="$QUICKJS_COMMIT" />
            </metadata>
          </package>
          EOF

          echo "Generated targets:"
          cat "$BUILD_NATIVE_DIR/$PACKAGE_ID.targets"

          echo "Generated nuspec:"
          cat "$WORK_DIR/$PACKAGE_ID.nuspec"

      - name: Pack NuGet manually
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$OUT_DIR"

          NUPKG="$OUT_DIR/$PACKAGE_ID.$VERSION.nupkg"
          NUPKG_ROOT="$WORK_DIR/nupkg-root"

          rm -f "$NUPKG"
          rm -rf "$NUPKG_ROOT"

          mkdir -p "$NUPKG_ROOT"

          cp "$WORK_DIR/$PACKAGE_ID.nuspec" "$NUPKG_ROOT/$PACKAGE_ID.nuspec"
          cp -R "$WORK_DIR/package/build" "$NUPKG_ROOT/build"
          cp -R "$WORK_DIR/package/runtimes" "$NUPKG_ROOT/runtimes"

          cd "$NUPKG_ROOT"

          zip -r "$NUPKG" \
            "$PACKAGE_ID.nuspec" \
            build \
            runtimes

          echo "NUPKG=$NUPKG" >> "$GITHUB_ENV"

          echo "Created package:"
          ls -lh "$NUPKG"

          echo "Package content:"
          unzip -l "$NUPKG"

      - name: Smoke test native C link from packed NuGet
        shell: bash
        run: |
          set -euo pipefail

          SMOKE_ROOT="$WORK_DIR/smoke-native-link"
          EXTRACTED="$SMOKE_ROOT/extracted"
          SMOKE_C="$SMOKE_ROOT/smoke.c"

          rm -rf "$SMOKE_ROOT"
          mkdir -p "$EXTRACTED"

          unzip -q "$NUPKG" -d "$EXTRACTED"

          cat > "$SMOKE_C" <<'EOF'
          #include <stddef.h>
          #include "quickjs.h"

          int main(void) {
              JSRuntime *rt = JS_NewRuntime();
              if (!rt) {
                  return 10;
              }

              JSContext *ctx = JS_NewContext(rt);
              if (!ctx) {
                  JS_FreeRuntime(rt);
                  return 11;
              }

              JSValue value = JS_Eval(ctx, "1+1", 3, "<smoke>", JS_EVAL_TYPE_GLOBAL);
              JS_FreeValue(ctx, value);

              JS_FreeContext(ctx);
              JS_FreeRuntime(rt);
              return 0;
          }
          EOF

          test_link_one() {
            local rid="$1"
            local triple="$2"
            local expected_machine="$3"
            local import_lib_name="$4"
            local test_name="$5"

            local cc="$LLVM_MINGW_DIR/bin/${triple}-clang"
            local readobj="$LLVM_MINGW_DIR/bin/llvm-readobj"

            local include_dir="$EXTRACTED/build/native/include"
            local lib_path="$EXTRACTED/build/native/lib/$rid/$import_lib_name"
            local out_dir="$SMOKE_ROOT/$rid/$test_name"
            local exe="$out_dir/smoke.exe"

            mkdir -p "$out_dir"

            echo "Testing native link: rid=$rid import_lib=$import_lib_name"

            test -f "$include_dir/quickjs.h"
            test -f "$lib_path"
            test -f "$EXTRACTED/runtimes/$rid/native/$PACKAGE_ID.dll"

            "$cc" \
              "$SMOKE_C" \
              -I"$include_dir" \
              "$lib_path" \
              -o "$exe"

            "$readobj" --file-headers "$exe" | tee "$out_dir/headers.txt"
            grep -q "$expected_machine" "$out_dir/headers.txt"

            "$readobj" --coff-imports "$exe" | tee "$out_dir/imports.txt"
            grep -q "$PACKAGE_ID.dll" "$out_dir/imports.txt"
          }

          test_link_one "win-x64" "x86_64-w64-mingw32" "IMAGE_FILE_MACHINE_AMD64" "$PACKAGE_ID.lib" "msvc-import-lib"
          test_link_one "win-x64" "x86_64-w64-mingw32" "IMAGE_FILE_MACHINE_AMD64" "lib$PACKAGE_ID.dll.a" "gnu-import-lib"

          test_link_one "win-arm64" "aarch64-w64-mingw32" "IMAGE_FILE_MACHINE_ARM64" "$PACKAGE_ID.lib" "msvc-import-lib"
          test_link_one "win-arm64" "aarch64-w64-mingw32" "IMAGE_FILE_MACHINE_ARM64" "lib$PACKAGE_ID.dll.a" "gnu-import-lib"

          echo "Native C link smoke tests passed."

      - name: Verify NuGet content
        shell: bash
        run: |
          set -euo pipefail

          unzip -l "$NUPKG"

          echo "Checking required files..."

          unzip -l "$NUPKG" | grep "build/native/$PACKAGE_ID.props"
          unzip -l "$NUPKG" | grep "build/native/$PACKAGE_ID.targets"
          unzip -l "$NUPKG" | grep "build/native/include/quickjs.h"

          unzip -l "$NUPKG" | grep "build/native/lib/win-x64/$PACKAGE_ID.lib"
          unzip -l "$NUPKG" | grep "build/native/lib/win-x64/lib$PACKAGE_ID.dll.a"
          unzip -l "$NUPKG" | grep "build/native/bin/win-x64/$PACKAGE_ID.dll"

          unzip -l "$NUPKG" | grep "build/native/lib/win-arm64/$PACKAGE_ID.lib"
          unzip -l "$NUPKG" | grep "build/native/lib/win-arm64/lib$PACKAGE_ID.dll.a"
          unzip -l "$NUPKG" | grep "build/native/bin/win-arm64/$PACKAGE_ID.dll"

          unzip -l "$NUPKG" | grep "runtimes/win-x64/native/$PACKAGE_ID.dll"
          unzip -l "$NUPKG" | grep "runtimes/win-arm64/native/$PACKAGE_ID.dll"

          echo "Checking that libwinpthread-1.dll is not packaged..."
          if unzip -l "$NUPKG" | grep -q "libwinpthread-1.dll"; then
            echo "libwinpthread-1.dll should not be packaged."
            exit 1
          fi

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.QuickJS-${{ env.VERSION }}
          path: ${{ env.NUPKG }}
          if-no-files-found: error

  smoke-windows:
    name: Smoke test NuGet on Windows
    runs-on: windows-latest
    needs: build

    env:
      PACKAGE_ID: X.Script.QuickJS
      VERSION: ${{ needs.build.outputs.version }}
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget-packages

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: X.Script.QuickJS-${{ needs.build.outputs.version }}
          path: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Create and run PInvoke smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Get-PeMachineHex {
              param(
                  [Parameter(Mandatory = $true)]
                  [string] $Path
              )

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)]
                  [string] $Path,

                  [Parameter(Mandatory = $true)]
                  [string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
                  throw "PE machine mismatch. Expected $Expected, got $actual. File: $Path"
              }
          }

          $pkgDir = Resolve-Path "$env:GITHUB_WORKSPACE\nupkg"

          Get-ChildItem $pkgDir -Recurse

          $workDir = Join-Path $env:GITHUB_WORKSPACE "smoke-dotnet"
          Remove-Item -Recurse -Force $workDir -ErrorAction SilentlyContinue

          dotnet new console --framework net9.0 --name SmokeDotNet --output $workDir

          Push-Location $workDir

          dotnet add package $env:PACKAGE_ID `
            --version $env:VERSION `
            --source $pkgDir

          @'
          using System;
          using System.Runtime.InteropServices;

          internal static class Native
          {
              [DllImport("X.Script.QuickJS", CallingConvention = CallingConvention.Cdecl)]
              internal static extern IntPtr JS_NewRuntime();

              [DllImport("X.Script.QuickJS", CallingConvention = CallingConvention.Cdecl)]
              internal static extern void JS_FreeRuntime(IntPtr rt);

              [DllImport("X.Script.QuickJS", CallingConvention = CallingConvention.Cdecl)]
              internal static extern IntPtr JS_NewContext(IntPtr rt);

              [DllImport("X.Script.QuickJS", CallingConvention = CallingConvention.Cdecl)]
              internal static extern void JS_FreeContext(IntPtr ctx);
          }

          IntPtr rt = Native.JS_NewRuntime();
          if (rt == IntPtr.Zero)
          {
              Console.Error.WriteLine("JS_NewRuntime returned null.");
              Environment.Exit(10);
          }

          IntPtr ctx = Native.JS_NewContext(rt);
          if (ctx == IntPtr.Zero)
          {
              Native.JS_FreeRuntime(rt);
              Console.Error.WriteLine("JS_NewContext returned null.");
              Environment.Exit(11);
          }

          Native.JS_FreeContext(ctx);
          Native.JS_FreeRuntime(rt);

          Console.WriteLine("QuickJS native PInvoke smoke test passed.");
          '@ | Set-Content -Path Program.cs -Encoding UTF8

          dotnet restore

          $publishX64 = Join-Path $workDir "publish-win-x64"
          $publishArm64 = Join-Path $workDir "publish-win-arm64"

          dotnet publish .\SmokeDotNet.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o $publishX64

          $dllName = "$($env:PACKAGE_ID).dll"
          $x64Dll = Join-Path $publishX64 $dllName

          Get-ChildItem $publishX64
          Assert-PeMachine -Path $x64Dll -Expected "0x8664"

          & (Join-Path $publishX64 "SmokeDotNet.exe")

          dotnet publish .\SmokeDotNet.csproj `
            -c Release `
            -r win-arm64 `
            --self-contained false `
            -o $publishArm64

          $arm64Dll = Join-Path $publishArm64 $dllName

          Get-ChildItem $publishArm64
          Assert-PeMachine -Path $arm64Dll -Expected "0xAA64"

          Pop-Location

          Write-Host "Windows NuGet smoke tests passed."

  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs:
      - build
      - smoke-windows

    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: X.Script.QuickJS-${{ needs.build.outputs.version }}
          path: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish to NuGet.org
        shell: bash
        run: |
          set -euo pipefail

          NUPKG="$(find nupkg -name '*.nupkg' -type f | head -n 1)"

          if [ -z "$NUPKG" ]; then
            echo "No .nupkg found."
            exit 1
          fi

          dotnet nuget push "$NUPKG" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate