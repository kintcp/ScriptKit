          }

          New-Item -ItemType Directory -Force -Path $testDir | Out-Null
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null

          Expand-Archive -Path $env:NUPKG -DestinationPath $extractDir -Force

          $native = Join-Path $extractDir "build\native"
          $includeDir = Join-Path $native "include"
          $libDir = Join-Path $native "lib\win-arm64"
          $binDir = Join-Path $native "bin\win-arm64"

          $importLib = Join-Path $libDir "$env:PACKAGE_ID.lib"
          $dll = Join-Path $binDir "$env:PACKAGE_ID.dll"

          if (!(Test-Path $includeDir)) {
            throw "Missing include dir from nupkg: $includeDir"
          }

          if (!(Test-Path $importLib)) {
            throw "Missing ARM64 import lib from nupkg: $importLib"
          }

          if (!(Test-Path $dll)) {
            throw "Missing ARM64 DLL from nupkg: $dll"
          }

          @'
          #include <v8.h>
          #include <cstdio>

          int main() {
              const char* version = v8::V8::GetVersion();
              if (version == nullptr || version[0] == 0) {
                  return 10;
              }

              std::puts(version);
              return 0;
          }
          '@ | Set-Content -Path $main -Encoding UTF8

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $devcmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"

          $buildCmd = Join-Path $testDir "build-arm64.cmd"

          @"
          @echo off
          call "$devcmd" -arch=arm64 -host_arch=x64
          if errorlevel 1 exit /b 1

          clang-cl --target=aarch64-pc-windows-msvc /nologo /std:c++20 /EHsc /MT /O2 /DNDEBUG /DUSING_V8_SHARED /DV8_GN_HEADER /I "$includeDir" "$main" /link /MACHINE:ARM64 /LIBPATH:"$libDir" X.Script.V8.lib /OUT:"$exe"
          if errorlevel 1 exit /b 1
          "@ | Set-Content -Path $buildCmd -Encoding ASCII

          & cmd.exe /c "`"$buildCmd`""

          if ($LASTEXITCODE -ne 0) {
            throw "Native ARM64 DLL smoke test link failed with exit code $LASTEXITCODE"
          }

          Assert-PeMachine -Path $exe -Expected "0xAA64"
          Assert-PeMachine -Path $dll -Expected "0xAA64"

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-${{ env.VERSION }}
          path: ${{ env.NUPKG }}
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: windows-2022
    needs: pack-nuget

    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: X.Script.V8-${{ needs.pack-nuget.outputs.version }}
          path: nupkg

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $nupkg = Get-ChildItem -Path "nupkg" -Filter "*.nupkg" -Recurse | Select-Object -First 1

          if (-not $nupkg) {
            throw "No .nupkg found."
          }

          dotnet nuget push $nupkg.FullName `
            --source "https://api.nuget.org/v3/index.json" `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --skip-duplicate