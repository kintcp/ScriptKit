          }

          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-test-arm64"
          $extractDir = Join-Path $testDir "package"
          $main = Join-Path $testDir "main.cc"
          $exe = Join-Path $testDir "v8-smoke-arm64.exe"

          if (Test-Path $testDir) {
