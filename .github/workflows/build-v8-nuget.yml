name: Build X.Script.V8 NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "15.1.44"
      v8_ref:
        description: "V8 git ref, branch, tag, or commit"
        required: true
        default: "15.1.44"
      publish:
        description: "Publish to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v8-v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build V8 Windows x64 NuGet
    runs-on: windows-latest

    env:
      PACKAGE_ID: X.Script.V8
      V8_REPO: https://chromium.googlesource.com/v8/v8.git
      DEPOT_TOOLS_DIR: ${{ github.workspace }}\depot_tools
      V8_DIR: ${{ github.workspace }}\v8
      OUT_DIR: ${{ github.workspace }}\artifacts\v8-nuget
      WORK_DIR: ${{ github.workspace }}\artifacts\v8-nuget\work
      GN_ARGS_CACHE_VERSION: v12-msvc-stl-nopc-clean
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Resolve version and V8 ref
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $version = $tag.Replace("v8-v", "")
            $v8Ref = $version
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "VERSION=$version"
          Write-Host "V8_REF=$v8Ref"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vsPath = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $vsPathForGn = $vsPath -replace "\\", "/"

          "VS2022_INSTALL=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VS2022_INSTALL_GN=$vsPathForGn" | Out-File -FilePath $env:GITHUB_ENV -Append
          "vs2022_install=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "VS2022_INSTALL=$vsPath"
          Write-Host "VS2022_INSTALL_GN=$vsPathForGn"

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPOT_TOOLS_DIR }}
          key: depot-tools-windows-${{ runner.os }}-v4

      - name: Install depot_tools
        shell: pwsh
        run: |
          git config --global core.longpaths true

          if (-not (Test-Path "$env:DEPOT_TOOLS_DIR\.git")) {
            if (Test-Path "$env:DEPOT_TOOLS_DIR") {
              Remove-Item "$env:DEPOT_TOOLS_DIR" -Recurse -Force
            }

            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:DEPOT_TOOLS_DIR"
          } else {
            Push-Location "$env:DEPOT_TOOLS_DIR"
            try {
              git fetch --depth=1 origin main
              git checkout main
              git reset --hard origin/main
            } finally {
              Pop-Location
            }
          }

          "$env:DEPOT_TOOLS_DIR" | Out-File -FilePath $env:GITHUB_PATH -Append

          Write-Host "Depot tools ready at $env:DEPOT_TOOLS_DIR"

      - name: Cache V8 checkout
        uses: actions/cache@v4
        with:
          path: ${{ env.V8_DIR }}
          key: v8-checkout-windows-${{ env.V8_REF }}-v5
          restore-keys: |
            v8-checkout-windows-${{ env.V8_REF }}-
            v8-checkout-windows-

      - name: Fetch V8 with depot_tools
        shell: cmd
        run: |
          set PATH=%DEPOT_TOOLS_DIR%;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"

          if not exist "%V8_DIR%\.git" (
            echo V8 checkout cache miss. Running fetch v8...
            fetch --nohooks v8
          ) else (
            echo V8 checkout cache hit.
          )

          cd /d "%V8_DIR%"

          git fetch origin --tags
          git checkout "%V8_REF%"

          gclient sync -D --no-history --shallow
          gclient runhooks

          echo "Generating LASTCHANGE"
          python3 build\util\lastchange.py -o build\util\LASTCHANGE

          echo V8 commit:
          git rev-parse HEAD
          git log -1 --oneline

          echo Checking V8 tools:

          if not exist "%V8_DIR%\buildtools\win\gn.exe" (
            echo Missing %V8_DIR%\buildtools\win\gn.exe
            dir /s /b "%V8_DIR%\buildtools"
            exit /b 1
          )

          if not exist "%V8_DIR%\third_party\ninja\ninja.exe" (
            echo Missing %V8_DIR%\third_party\ninja\ninja.exe
            dir /s /b "%V8_DIR%\third_party\ninja"
            exit /b 1
          )

          "%V8_DIR%\buildtools\win\gn.exe" --version
          "%V8_DIR%\third_party\ninja\ninja.exe" --version

      - name: Resolve V8 commit
        shell: pwsh
        run: |
          $commit = git -C "$env:V8_DIR" rev-parse HEAD
          "V8_COMMIT=$commit" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "V8_COMMIT=$commit"

          $timestamp = git -C "$env:V8_DIR" log -1 --format="%ct"
          $outPath = Join-Path $env:V8_DIR "build\util\LASTCHANGE.committime"
          [System.IO.File]::WriteAllText($outPath, $timestamp)

      - name: Generate V8 build files
        shell: pwsh
        run: |
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $env:GYP_MSVS_VERSION = "2022"

          Set-Location $env:V8_DIR

          $gn = Join-Path $env:V8_DIR "buildtools\win\gn.exe"

          if (-not (Test-Path $gn)) {
            throw "gn.exe not found: $gn"
          }

          if (-not $env:VS2022_INSTALL_GN) {
            throw "VS2022_INSTALL_GN is empty"
          }

          $buildDir = "out/x64.release.msvc-stl-nopc"

          $gnArgs = @(
            "is_debug=false"
            'target_os="win"'
            'target_cpu="x64"'
            'v8_target_cpu="x64"'
            "is_component_build=false"
            "is_clang=true"
            "use_custom_libcxx=false"
            "v8_monolithic=true"
            "v8_use_external_startup_data=false"
            "v8_enable_i18n_support=false"
            "v8_enable_sandbox=false"
            "v8_enable_pointer_compression=false"
            "v8_enable_pointer_compression_shared_cage=false"
            "v8_enable_31bit_smis_on_64bit_arch=false"
            "v8_enable_external_code_space=false"
            "v8_generate_external_defines_header=true"
            "treat_warnings_as_errors=false"
            "symbol_level=0"
          ) -join " "

          Write-Host "GN: $gn"
          Write-Host "Build dir: $buildDir"
          Write-Host "Args: $gnArgs"

          # Important: do not reuse/cross-restore an existing V8 out dir here.
          # Torque-generated C++ contains layout constants. Reusing an out dir from
          # different GN args can produce false static_assert failures such as
          # JSInterceptorMap offset mismatches.
          if (Test-Path $buildDir) {
            Write-Host "Removing existing V8 build directory for a clean GN/Torque generation: $buildDir"
            Remove-Item $buildDir -Recurse -Force
          }

          & $gn gen $buildDir "--args=$gnArgs"

          if ($LASTEXITCODE -ne 0) {
            throw "gn gen failed with exit code $LASTEXITCODE"
          }

          Write-Host "Effective args.gn:"
          Get-Content (Join-Path $buildDir "args.gn") | ForEach-Object { Write-Host $_ }

          Write-Host "Selected GN arg values:"
          $argNames = @(
            "use_custom_libcxx",
            "v8_enable_pointer_compression",
            "v8_enable_pointer_compression_shared_cage",
            "v8_enable_31bit_smis_on_64bit_arch",
            "v8_enable_external_code_space",
            "v8_enable_sandbox",
            "v8_enable_map_packing",
            "v8_generate_external_defines_header"
          )
          foreach ($name in $argNames) {
            Write-Host "--- $name ---"
            & $gn args $buildDir "--list=$name"
            if ($LASTEXITCODE -ne 0) {
              throw "gn args --list=$name failed with exit code $LASTEXITCODE"
            }
          }

      - name: Build v8_monolith
        shell: pwsh
        run: |
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $env:GYP_MSVS_VERSION = "2022"

          Set-Location $env:V8_DIR

          $ninja = Join-Path $env:V8_DIR "third_party\ninja\ninja.exe"

          if (-not (Test-Path $ninja)) {
            throw "ninja.exe not found: $ninja"
          }

          $buildDir = "out/x64.release.msvc-stl-nopc"

          # Generate and inspect v8-gn.h before the heavy build, so a wrong/stale
          # configuration fails loudly before Torque/C++ object layout asserts.
          & $ninja -C $buildDir v8_config_headers
          if ($LASTEXITCODE -ne 0) {
            throw "ninja v8_config_headers failed with exit code $LASTEXITCODE"
          }

          $v8GnHeader = Join-Path $buildDir "gen\include\v8-gn.h"
          if (-not (Test-Path $v8GnHeader)) {
            throw "Generated v8-gn.h not found: $v8GnHeader"
          }

          $v8Gn = Get-Content $v8GnHeader -Raw
          Write-Host "Generated v8-gn.h:"
          Write-Host $v8Gn

          $forbiddenDefines = @(
            "V8_COMPRESS_POINTERS",
            "V8_COMPRESS_POINTERS_IN_SHARED_CAGE",
            "V8_31BIT_SMIS_ON_64BIT_ARCH",
            "V8_ENABLE_SANDBOX",
            "V8_EXTERNAL_CODE_SPACE"
          )
          foreach ($define in $forbiddenDefines) {
            if ($v8Gn -match "(?m)^#define\s+$define(\s|$)") {
              throw "Unexpected $define in generated v8-gn.h. GN args did not produce the intended no-pointer-compression/no-sandbox configuration."
            }
          }

          & $ninja -C $buildDir v8_monolith

          if ($LASTEXITCODE -ne 0) {
            throw "ninja failed with exit code $LASTEXITCODE"
          }

      - name: Prepare NuGet package files
        shell: pwsh
        run: |
          $pkgRoot = Join-Path $env:WORK_DIR "package"
          $buildNativeDir = Join-Path $pkgRoot "build\native"
          $includeDir = Join-Path $buildNativeDir "include"
          $libDir = Join-Path $buildNativeDir "lib\win-x64"

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null

          Copy-Item "$env:V8_DIR\include\*" $includeDir -Recurse -Force

          $v8GnHeader = Join-Path $env:V8_DIR "out\x64.release.msvc-stl-nopc\gen\include\v8-gn.h"
          if (-not (Test-Path $v8GnHeader)) {
            Write-Host "Searching for generated v8-gn.h..."
            Get-ChildItem "$env:V8_DIR\out\x64.release.msvc-stl-nopc\gen" -Recurse -Filter "v8-gn.h" | ForEach-Object {
              Write-Host $_.FullName
            }
            throw "v8-gn.h not found. Keep v8_generate_external_defines_header=true and make sure v8_config_headers is generated."
          }
          Copy-Item $v8GnHeader (Join-Path $includeDir "v8-gn.h") -Force

          $libCandidates = @(
            "$env:V8_DIR\out\x64.release.msvc-stl-nopc\obj\v8_monolith.lib",
            "$env:V8_DIR\out\x64.release.msvc-stl-nopc\v8_monolith.lib"
          )

          $libSource = $null

          foreach ($candidate in $libCandidates) {
            if (Test-Path $candidate) {
              $libSource = $candidate
              break
            }
          }

          if (-not $libSource) {
            Write-Host "Searching for v8_monolith.lib..."
            Get-ChildItem "$env:V8_DIR\out\x64.release.msvc-stl-nopc" -Recurse -Filter "v8_monolith.lib" | ForEach-Object {
              Write-Host $_.FullName
            }

            throw "v8_monolith.lib not found."
          }

          Copy-Item $libSource (Join-Path $libDir "v8_monolith.lib") -Force

          $propsPath = Join-Path $buildNativeDir "$env:PACKAGE_ID.props"
          $targetsPath = Join-Path $buildNativeDir "$env:PACKAGE_ID.targets"
          $nuspecPath = Join-Path $env:WORK_DIR "$env:PACKAGE_ID.nuspec"

          $propsContent = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Project>
            <ItemDefinitionGroup>
              <ClCompile>
                <LanguageStandard>stdcpp20</LanguageStandard>
                <AdditionalIncludeDirectories>$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
                <PreprocessorDefinitions>V8_GN_HEADER;%(PreprocessorDefinitions)</PreprocessorDefinitions>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          '@

          $targetsContent = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Project>
            <ItemDefinitionGroup Condition="'$(Platform)' == 'x64'">
              <Link>
                <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
                <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>
              </Link>
            </ItemDefinitionGroup>
          </Project>
          '@

          $commit = git -C "$env:V8_DIR" rev-parse HEAD

          $nuspecContent = @"
          <?xml version="1.0" encoding="utf-8"?>
          <package>
            <metadata>
              <id>$env:PACKAGE_ID</id>
              <version>$env:VERSION</version>
              <authors>X</authors>
              <owners>X</owners>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>V8 native Windows x64 static library and headers for X.Script.</description>
              <tags>v8 native javascript win-x64</tags>
              <repository type="git" url="$env:V8_REPO" commit="$commit" />
            </metadata>
          </package>
          "@

          $propsContent = $propsContent -replace "^[ ]{10}", ""
          $targetsContent = $targetsContent -replace "^[ ]{10}", ""
          $nuspecContent = $nuspecContent -replace "^[ ]{10}", ""

          Set-Content -Path $propsPath -Value $propsContent -Encoding UTF8
          Set-Content -Path $targetsPath -Value $targetsContent -Encoding UTF8
          Set-Content -Path $nuspecPath -Value $nuspecContent -Encoding UTF8

          Write-Host "Package layout:"
          Get-ChildItem $pkgRoot -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:OUT_DIR | Out-Null

          $nupkg = Join-Path $env:OUT_DIR "$env:PACKAGE_ID.$env:VERSION.nupkg"
          $nupkgRoot = Join-Path $env:WORK_DIR "nupkg-root"

          if (Test-Path $nupkg) {
            Remove-Item $nupkg -Force
          }

          if (Test-Path $nupkgRoot) {
            Remove-Item $nupkgRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $nupkgRoot | Out-Null

          Copy-Item "$env:WORK_DIR\$env:PACKAGE_ID.nuspec" (Join-Path $nupkgRoot "$env:PACKAGE_ID.nuspec") -Force
          Copy-Item "$env:WORK_DIR\package\build" (Join-Path $nupkgRoot "build") -Recurse -Force

          Push-Location $nupkgRoot

          try {
            Compress-Archive -Path "$env:PACKAGE_ID.nuspec", "build" -DestinationPath $nupkg -Force
          } finally {
            Pop-Location
          }

          "NUPKG=$nupkg" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Created package:"
          Write-Host $nupkg

      - name: Verify NuGet content
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

          try {
            foreach ($entry in $zip.Entries) {
              Write-Host $entry.FullName
            }
          } finally {
            $zip.Dispose()
          }

          Write-Host "Checking required files..."

          $required = @(
            "build/native/$env:PACKAGE_ID.props"
            "build/native/$env:PACKAGE_ID.targets"
            "build/native/include/v8.h"
            "build/native/include/v8-gn.h"
            "build/native/lib/win-x64/v8_monolith.lib"
          )

          foreach ($item in $required) {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

            try {
              $found = $false

              foreach ($entry in $zip.Entries) {
                if ($entry.FullName -eq $item) {
                  $found = $true
                  break
                }
              }

              if (-not $found) {
                throw "Required file missing from NuGet package: $item"
              }
            } finally {
              $zip.Dispose()
            }
          }


      - name: Smoke test native link
        shell: pwsh
        run: |
          $testDir = Join-Path $env:WORK_DIR "native-link-test"
          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          $pkgDir = Join-Path $testDir "pkg"
          Expand-Archive -Path $env:NUPKG -DestinationPath $pkgDir -Force

          $nativeDir = Join-Path $pkgDir "build\native"
          $sourcePath = Join-Path $testDir "hello-v8.cc"
          $exePath = Join-Path $testDir "hello-v8.exe"

          @'
          #include <libplatform/libplatform.h>
          #include <v8.h>

          int main() {
            auto platform = v8::platform::NewDefaultPlatform();
            v8::V8::InitializePlatform(platform.get());
            v8::V8::Initialize();
            v8::V8::Dispose();
            v8::V8::DisposePlatform();
            return 0;
          }
          '@ | Set-Content -Path $sourcePath -Encoding UTF8

          $vsDevCmd = Join-Path $env:VS2022_INSTALL "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found: $vsDevCmd"
          }

          $compileCmd = @"
          call "$vsDevCmd" -arch=x64 -host_arch=x64
          clang-cl /nologo /std:c++20 /EHsc /MD /DV8_GN_HEADER /I "$nativeDir\include" "$sourcePath" /link /LIBPATH:"$nativeDir\lib\win-x64" v8_monolith.lib winmm.lib dbghelp.lib shlwapi.lib advapi32.lib ws2_32.lib /OUT:"$exePath"
          "@

          cmd.exe /d /s /c $compileCmd

          if ($LASTEXITCODE -ne 0) {
            throw "Native link smoke test failed. The NuGet package is not consumable by a VS/MSBuild ClangCL C++ project."
          }

          Write-Host "Native link smoke test passed: $exePath"

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-${{ env.VERSION }}
          path: ${{ env.NUPKG }}
          if-no-files-found: error

      - name: Publish to GitHub Packages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        shell: pwsh
        run: |
          dotnet nuget push "$env:NUPKG" `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            --api-key "${{ secrets.GITHUB_TOKEN }}" `
            --skip-duplicate
