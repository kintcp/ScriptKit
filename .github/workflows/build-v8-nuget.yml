name: Build X.Script.V8 NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "14.3.127.5"
      v8_ref:
        description: "V8 git ref, tag, branch, or commit"
        required: true
        default: "14.3.127.5"
      publish:
        description: "Publish to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v8-v*"

permissions:
  contents: read
  packages: write

jobs:
  build-win-x64-nuget:
    name: Build Windows x64 NuGet
    runs-on: windows-2022

    env:
      PACKAGE_ID: X.Script.V8
      DEPOT_TOOLS_REPO: https://chromium.googlesource.com/chromium/tools/depot_tools.git
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"
      BUILD_DIR: out.gn/win.x64.release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve package version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $version = $tag.Replace("v8-v", "")
            $v8Ref = $version
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "VERSION=$version"
          Write-Host "V8_REF=$v8Ref"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depot_tools
        shell: pwsh
        run: |
          git config --global core.longpaths true
          git config --global depot-tools.allowGlobalGitConfig true

          $depotTools = Join-Path $env:GITHUB_WORKSPACE "depot_tools"

          if (Test-Path $depotTools) {
            Remove-Item $depotTools -Recurse -Force
          }

          git clone $env:DEPOT_TOOLS_REPO $depotTools

          $depotTools | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "depot_tools installed at $depotTools"

      - name: Fetch V8 checkout
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          fetch --nohooks v8

      - name: Configure V8 checkout
        shell: pwsh
        run: |
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"

          if (-not (Test-Path $v8Dir)) {
            throw "V8 checkout not found: $v8Dir"
          }

          git -C $v8Dir fetch origin --tags
          git -C $v8Dir checkout $env:V8_REF

          $gclientPath = Join-Path $env:GITHUB_WORKSPACE ".gclient"

          $gclientLines = @(
            'solutions = [',
            '  {',
            '    "name": "v8",',
            '    "url": "https://chromium.googlesource.com/v8/v8.git",',
            '    "managed": False,',
            '    "custom_deps": {',
            '      "v8/test/benchmarks/data": None,',
            '      "v8/test/mozilla/data": None,',
            '      "v8/test/test262/data": None,',
            '      "v8/test/wasm-js/data": None,',
            '    },',
            '  },',
            ']'
          )

          Set-Content -Path $gclientPath -Value $gclientLines -Encoding ASCII

          Write-Host ".gclient:"
          Get-Content $gclientPath

          Write-Host "V8 HEAD before sync:"
          git -C $v8Dir rev-parse HEAD
          git -C $v8Dir log -1 --oneline

      - name: Sync V8 dependencies
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          gclient sync -D --force --reset

          cd /d "%GITHUB_WORKSPACE%\v8"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Write GN args
        shell: pwsh
        run: |
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $buildDir = Join-Path $v8Dir $env:BUILD_DIR

          if (Test-Path $buildDir) {
            Remove-Item $buildDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          # Keep this line aligned with haroel/v8-build args.win.x64.release.gn.
          $args = 'target_os="win" target_cpu = "x64" v8_target_cpu="x64" clang_use_chrome_plugins=false chrome_pgo_phase=false dcheck_always_on=false enable_rust=false is_cfi=false is_asan=false is_clang=true is_component_build=false is_debug=false strip_debug_info=true symbol_level=0 treat_warnings_as_errors=false use_custom_libcxx=false use_rtti=false use_sysroot=false v8_deprecation_warnings=false v8_enable_builtins_optimization=true v8_enable_gdbjit=false v8_enable_i18n_support=false v8_enable_pointer_compression=false v8_enable_sandbox=false v8_enable_snapshot_compression=false v8_enable_temporal_support=false v8_enable_test_features=false v8_enable_webassembly=true v8_imminent_deprecation_warnings=false v8_monolithic=true v8_use_external_startup_data=false'

          $argsPath = Join-Path $buildDir "args.gn"
          Set-Content -Path $argsPath -Value $args -Encoding ASCII

          Write-Host "args.gn:"
          Get-Content $argsPath

      - name: Build V8 monolith
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%\v8"

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" gen "%BUILD_DIR%"
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\third_party\ninja\ninja.exe" -C "%BUILD_DIR%" v8_monolith
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" args --list "%BUILD_DIR%" > "%BUILD_DIR%\args.full.txt"
          if errorlevel 1 exit /b 1

          if not exist "%BUILD_DIR%\obj\v8_monolith.lib" (
            echo v8_monolith.lib not found
            dir /s /b "%BUILD_DIR%\*v8_monolith.lib"
            exit /b 1
          )

      - name: Prepare NuGet layout
        shell: pwsh
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $buildNative = Join-Path $root "build\native"
          $includeDir = Join-Path $buildNative "include"
          $libDir = Join-Path $buildNative "lib\win-x64"
          $buildInfoDir = Join-Path $buildNative "build-info"
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $v8BuildDir = Join-Path $v8Dir $env:BUILD_DIR

          if (Test-Path $root) {
            Remove-Item $root -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoDir | Out-Null

          Copy-Item "$v8Dir\include\*" $includeDir -Recurse -Force
          Copy-Item "$v8BuildDir\obj\v8_monolith.lib" "$libDir\v8_monolith.lib" -Force
          Copy-Item "$v8BuildDir\args.gn" "$buildInfoDir\args.gn" -Force
          Copy-Item "$v8BuildDir\args.full.txt" "$buildInfoDir\args.full.txt" -Force

          $propsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <LanguageStandard>stdcpp20</LanguageStandard>',
            '      <AdditionalIncludeDirectories>$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          $targetsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <ItemDefinitionGroup Condition="''$(Platform)'' == ''x64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          Set-Content -Path "$buildNative\$env:PACKAGE_ID.props" -Value $propsLines -Encoding UTF8
          Set-Content -Path "$buildNative\$env:PACKAGE_ID.targets" -Value $targetsLines -Encoding UTF8

          $commit = git -C $v8Dir rev-parse HEAD

          $nuspecLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<package>',
            '  <metadata>',
            "    <id>$env:PACKAGE_ID</id>",
            "    <version>$env:VERSION</version>",
            '    <authors>X.Script</authors>',
            '    <owners>X.Script</owners>',
            '    <requireLicenseAcceptance>false</requireLicenseAcceptance>',
            '    <description>V8 native Windows x64 static library and headers for X.Script.</description>',
            '    <tags>v8 native javascript win-x64 clangcl msvc</tags>',
            "    <repository type=\"git\" url=\"https://chromium.googlesource.com/v8/v8.git\" commit=\"$commit\" />",
            '  </metadata>',
            '</package>'
          )

          Set-Content -Path "$root\$env:PACKAGE_ID.nuspec" -Value $nuspecLines -Encoding UTF8

          Write-Host "NuGet layout:"
          Get-ChildItem $root -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $nupkg = Join-Path $outDir "$env:PACKAGE_ID.$env:VERSION.nupkg"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          if (Test-Path $nupkg) {
            Remove-Item $nupkg -Force
          }

          Push-Location $root
          try {
            Compress-Archive -Path "$env:PACKAGE_ID.nuspec", "build" -DestinationPath $nupkg -Force
          } finally {
            Pop-Location
          }

          "NUPKG=$nupkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Created NuGet package:"
          Write-Host $nupkg

      - name: Verify NuGet content
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $required = @(
            "$env:PACKAGE_ID.nuspec",
            "build/native/$env:PACKAGE_ID.props",
            "build/native/$env:PACKAGE_ID.targets",
            "build/native/include/v8.h",
            "build/native/include/libplatform/libplatform.h",
            "build/native/lib/win-x64/v8_monolith.lib",
            "build/native/build-info/args.gn",
            "build/native/build-info/args.full.txt"
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

          try {
            Write-Host "Package entries:"
            foreach ($entry in $zip.Entries) {
              Write-Host $entry.FullName
            }

            foreach ($item in $required) {
              $found = $false

              foreach ($entry in $zip.Entries) {
                if ($entry.FullName -eq $item) {
                  $found = $true
                  break
                }
              }

              if (-not $found) {
                throw "Missing required package entry: $item"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: Native link smoke test
        shell: pwsh
        run: |
          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-test"

          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          $main = Join-Path $testDir "main.cc"
          $exe = Join-Path $testDir "v8-smoke.exe"
          $native = Join-Path $env:GITHUB_WORKSPACE "nuget-root\build\native"

          $sourceLines = @(
            '#include <libplatform/libplatform.h>',
            '#include <v8.h>',
            '',
            'int main() {',
            '  auto platform = v8::platform::NewDefaultPlatform();',
            '  v8::V8::InitializePlatform(platform.get());',
            '  v8::V8::Initialize();',
            '  v8::V8::Dispose();',
            '  v8::V8::DisposePlatform();',
            '  return 0;',
            '}'
          )

          Set-Content -Path $main -Value $sourceLines -Encoding UTF8

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $devcmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"

          if (-not (Test-Path $devcmd)) {
            throw "VsDevCmd.bat not found: $devcmd"
          }

          $cmd = 'call "' + $devcmd + '" -arch=x64 -host_arch=x64 && clang-cl /nologo /std:c++20 /EHsc /MD /I "' + $native + '\include" "' + $main + '" /link /LIBPATH:"' + $native + '\lib\win-x64" v8_monolith.lib winmm.lib dbghelp.lib shlwapi.lib advapi32.lib ws2_32.lib /OUT:"' + $exe + '"'

          cmd.exe /c $cmd

          if ($LASTEXITCODE -ne 0) {
            throw "Native link smoke test failed with exit code $LASTEXITCODE"
          }

          Write-Host "Native link smoke test passed:"
          Write-Host $exe

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-${{ env.VERSION }}
          path: ${{ env.NUPKG }}
          if-no-files-found: error

      - name: Publish to GitHub Packages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        shell: pwsh
        run: |
          dotnet nuget push "$env:NUPKG" `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            --api-key "${{ secrets.GITHUB_TOKEN }}" `
            --skip-duplicate
