name: Build X.Script.V8 NuGet Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "14.3.127.5"
      v8_ref:
        description: "V8 git ref, tag, branch, or commit"
        required: true
        default: "14.3.127.5"
      publish:
        description: "Publish to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v8-v*"

permissions:
  contents: read
  packages: write

jobs:
  build-win-release-nuget:
    name: Build Windows x64/ARM64 Release NuGet
    runs-on: windows-2022

    env:
      PACKAGE_ID: X.Script.V8
      DEPOT_TOOLS_REPO: https://chromium.googlesource.com/chromium/tools/depot_tools.git
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"
      BUILD_DIR_X64: out.gn/win.x64.release
      BUILD_DIR_ARM64: out.gn/win.arm64.release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve package version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $version = $tag.Replace("v8-v", "")
            $v8Ref = $version
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "VERSION=$version"
          Write-Host "V8_REF=$v8Ref"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depot_tools
        shell: pwsh
        run: |
          git config --global core.longpaths true
          git config --global depot-tools.allowGlobalGitConfig true

          $depotTools = Join-Path $env:GITHUB_WORKSPACE "depot_tools"

          if (Test-Path $depotTools) {
            Remove-Item $depotTools -Recurse -Force
          }

          git clone $env:DEPOT_TOOLS_REPO $depotTools

          $depotTools | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "depot_tools installed at $depotTools"

      - name: Fetch V8 checkout
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          fetch --nohooks v8

      - name: Configure V8 checkout
        shell: pwsh
        run: |
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"

          if (-not (Test-Path $v8Dir)) {
            throw "V8 checkout not found: $v8Dir"
          }

          git -C $v8Dir fetch origin --tags
          git -C $v8Dir checkout $env:V8_REF

          $gclientPath = Join-Path $env:GITHUB_WORKSPACE ".gclient"

          $gclientLines = @(
            'solutions = [',
            '  {',
            '    "name": "v8",',
            '    "url": "https://chromium.googlesource.com/v8/v8.git",',
            '    "managed": False,',
            '    "custom_deps": {',
            '      "v8/test/benchmarks/data": None,',
            '      "v8/test/mozilla/data": None,',
            '      "v8/test/test262/data": None,',
            '      "v8/test/wasm-js/data": None,',
            '    },',
            '  },',
            ']'
          )

          Set-Content -Path $gclientPath -Value $gclientLines -Encoding ASCII

          Write-Host ".gclient:"
          Get-Content $gclientPath

          Write-Host "V8 HEAD before sync:"
          git -C $v8Dir rev-parse HEAD
          git -C $v8Dir log -1 --oneline

      - name: Sync V8 dependencies
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          gclient sync -D --force --reset

          cd /d "%GITHUB_WORKSPACE%\v8"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Write Release GN args for x64 and ARM64
        shell: pwsh
        run: |
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"

          function Write-V8GnArgs {
            param(
              [Parameter(Mandatory = $true)][string]$Cpu,
              [Parameter(Mandatory = $true)][string]$BuildDirName
            )

            $buildDir = Join-Path $v8Dir $BuildDirName

            if (Test-Path $buildDir) {
              Remove-Item $buildDir -Recurse -Force
            }

            New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

            # Release, static CRT (/MT), MSVC STL ABI, no V8 source patch.
            # Keep x64 and ARM64 aligned except target_cpu/v8_target_cpu.
            $args = "target_os=`"win`" target_cpu=`"$Cpu`" v8_target_cpu=`"$Cpu`" clang_use_chrome_plugins=false chrome_pgo_phase=false dcheck_always_on=false enable_rust=false is_cfi=false is_asan=false is_clang=true is_component_build=false is_debug=false strip_debug_info=true symbol_level=0 treat_warnings_as_errors=false use_custom_libcxx=false use_rtti=false use_sysroot=false v8_deprecation_warnings=false v8_enable_builtins_optimization=true v8_enable_gdbjit=false v8_enable_i18n_support=false v8_enable_pointer_compression=false v8_enable_sandbox=false v8_enable_snapshot_compression=false v8_enable_temporal_support=false v8_enable_test_features=false v8_enable_webassembly=true v8_imminent_deprecation_warnings=false v8_monolithic=true v8_use_external_startup_data=false"

            $argsPath = Join-Path $buildDir "args.gn"
            Set-Content -Path $argsPath -Value $args -Encoding ASCII

            Write-Host "args.gn for $Cpu ($BuildDirName):"
            Get-Content $argsPath
          }

          Write-V8GnArgs -Cpu "x64" -BuildDirName $env:BUILD_DIR_X64
          Write-V8GnArgs -Cpu "arm64" -BuildDirName $env:BUILD_DIR_ARM64

      - name: Build V8 monolith Release for x64 and ARM64
        shell: pwsh
        run: |
          $env:PATH = "$env:GITHUB_WORKSPACE\depot_tools;$env:PATH"
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $env:GYP_MSVS_VERSION = "2022"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          Set-Location $v8Dir

          $gn = Join-Path $v8Dir "buildtools\win\gn.exe"
          $ninja = Join-Path $v8Dir "third_party\ninja\ninja.exe"

          if (-not (Test-Path $gn)) {
            throw "gn.exe not found: $gn"
          }

          if (-not (Test-Path $ninja)) {
            throw "ninja.exe not found: $ninja"
          }

          foreach ($buildDir in @($env:BUILD_DIR_X64, $env:BUILD_DIR_ARM64)) {
            Write-Host "Generating $buildDir"
            & $gn gen $buildDir
            if ($LASTEXITCODE -ne 0) {
              throw "gn gen failed for $buildDir with exit code $LASTEXITCODE"
            }

            Write-Host "Building v8_monolith for $buildDir"
            & $ninja -C $buildDir v8_monolith
            if ($LASTEXITCODE -ne 0) {
              throw "ninja failed for $buildDir with exit code $LASTEXITCODE"
            }

            & $gn args --list $buildDir | Out-File -FilePath (Join-Path $buildDir "args.full.txt") -Encoding UTF8
            if ($LASTEXITCODE -ne 0) {
              throw "gn args --list failed for $buildDir with exit code $LASTEXITCODE"
            }

            $lib = Join-Path $buildDir "obj\v8_monolith.lib"
            if (-not (Test-Path $lib)) {
              Write-Host "Searching for v8_monolith.lib under $buildDir"
              Get-ChildItem $buildDir -Recurse -Filter "v8_monolith.lib" | ForEach-Object { Write-Host $_.FullName }
              throw "v8_monolith.lib not found for $buildDir"
            }

            Write-Host "Built $lib"
          }

      - name: Prepare NuGet layout
        shell: pwsh
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $buildNative = Join-Path $root "build\native"
          $includeDir = Join-Path $buildNative "include"
          $libX64Dir = Join-Path $buildNative "lib\win-x64"
          $libArm64Dir = Join-Path $buildNative "lib\win-arm64"
          $buildInfoX64Dir = Join-Path $buildNative "build-info\win-x64"
          $buildInfoArm64Dir = Join-Path $buildNative "build-info\win-arm64"
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $v8BuildX64Dir = Join-Path $v8Dir $env:BUILD_DIR_X64
          $v8BuildArm64Dir = Join-Path $v8Dir $env:BUILD_DIR_ARM64

          if (Test-Path $root) {
            Remove-Item $root -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $libArm64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoArm64Dir | Out-Null

          Copy-Item "$v8Dir\include\*" $includeDir -Recurse -Force

          Copy-Item "$v8BuildX64Dir\obj\v8_monolith.lib" "$libX64Dir\v8_monolith.lib" -Force
          Copy-Item "$v8BuildArm64Dir\obj\v8_monolith.lib" "$libArm64Dir\v8_monolith.lib" -Force

          Copy-Item "$v8BuildX64Dir\args.gn" "$buildInfoX64Dir\args.gn" -Force
          Copy-Item "$v8BuildX64Dir\args.full.txt" "$buildInfoX64Dir\args.full.txt" -Force
          Copy-Item "$v8BuildArm64Dir\args.gn" "$buildInfoArm64Dir\args.gn" -Force
          Copy-Item "$v8BuildArm64Dir\args.full.txt" "$buildInfoArm64Dir\args.full.txt" -Force

          $propsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <LanguageStandard>stdcpp20</LanguageStandard>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '      <AdditionalIncludeDirectories>$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '      <PreprocessorDefinitions>V8_ENABLE_CHECKS=0;%(PreprocessorDefinitions)</PreprocessorDefinitions>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          $targetsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <Target Name="XScriptV8ValidatePlatform" BeforeTargets="PrepareForBuild">',
            '    <Error Condition="''$(Platform)'' != ''x64'' and ''$(Platform)'' != ''ARM64''" Text="X.Script.V8 Release package supports only Platform=x64 or Platform=ARM64." />',
            '  </Target>',
            '  <ItemDefinitionGroup Condition="''$(Platform)'' == ''x64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Platform)'' == ''ARM64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-arm64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          Set-Content -Path "$buildNative\$env:PACKAGE_ID.props" -Value $propsLines -Encoding UTF8
          Set-Content -Path "$buildNative\$env:PACKAGE_ID.targets" -Value $targetsLines -Encoding UTF8

          $commit = git -C $v8Dir rev-parse HEAD

          $nuspecLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<package>',
            '  <metadata>',
            "    <id>$env:PACKAGE_ID</id>",
            "    <version>$env:VERSION</version>",
            '    <authors>X.Script</authors>',
            '    <owners>X.Script</owners>',
            '    <requireLicenseAcceptance>false</requireLicenseAcceptance>',
            '    <description>V8 native Windows x64 and ARM64 Release static libraries and headers for X.Script. This package uses MSVC STL ABI and static CRT /MT.</description>',
            '    <tags>v8 native javascript win-x64 win-arm64 clangcl msvc release mt static-crt</tags>',
            ('    <repository type="git" url="https://chromium.googlesource.com/v8/v8.git" commit="{0}" />' -f $commit),
            '  </metadata>',
            '</package>'
          )

          Set-Content -Path "$root\$env:PACKAGE_ID.nuspec" -Value $nuspecLines -Encoding UTF8

          Write-Host "NuGet layout:"
          Get-ChildItem $root -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $nupkg = Join-Path $outDir "$env:PACKAGE_ID.$env:VERSION.nupkg"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          if (Test-Path $nupkg) {
            Remove-Item $nupkg -Force
          }

          Push-Location $root
          try {
            Compress-Archive -Path "$env:PACKAGE_ID.nuspec", "build" -DestinationPath $nupkg -Force
          } finally {
            Pop-Location
          }

          "NUPKG=$nupkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Created NuGet package:"
          Write-Host $nupkg

      - name: Verify NuGet content
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $required = @(
            "$env:PACKAGE_ID.nuspec",
            "build/native/$env:PACKAGE_ID.props",
            "build/native/$env:PACKAGE_ID.targets",
            "build/native/include/v8.h",
            "build/native/include/libplatform/libplatform.h",
            "build/native/lib/win-x64/v8_monolith.lib",
            "build/native/lib/win-arm64/v8_monolith.lib",
            "build/native/build-info/win-x64/args.gn",
            "build/native/build-info/win-x64/args.full.txt",
            "build/native/build-info/win-arm64/args.gn",
            "build/native/build-info/win-arm64/args.full.txt"
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

          try {
            Write-Host "Package entries:"
            foreach ($entry in $zip.Entries) {
              Write-Host $entry.FullName
            }

            foreach ($item in $required) {
              $found = $false

              foreach ($entry in $zip.Entries) {
                if ($entry.FullName -eq $item) {
                  $found = $true
                  break
                }
              }

              if (-not $found) {
                throw "Missing required package entry: $item"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: Native Release link smoke test for x64 and ARM64
        shell: pwsh
        run: |
          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-test"

          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          $main = Join-Path $testDir "main.cc"
          $native = Join-Path $env:GITHUB_WORKSPACE "nuget-root\build\native"

          $sourceLines = @(
            '#include <libplatform/libplatform.h>',
            '#include <v8.h>',
            '',
            'int main() {',
            '  auto platform = v8::platform::NewDefaultPlatform();',
            '  v8::V8::InitializePlatform(platform.get());',
            '  v8::V8::Initialize();',
            '  v8::V8::Dispose();',
            '  v8::V8::DisposePlatform();',
            '  return 0;',
            '}'
          )

          Set-Content -Path $main -Value $sourceLines -Encoding UTF8

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $devcmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"

          if (-not (Test-Path $devcmd)) {
            throw "VsDevCmd.bat not found: $devcmd"
          }

          $tests = @(
            @{ Name = "x64"; DevArch = "x64"; Machine = "X64"; LibDir = "win-x64"; Out = "v8-smoke-x64.exe" },
            @{ Name = "ARM64"; DevArch = "arm64"; Machine = "ARM64"; LibDir = "win-arm64"; Out = "v8-smoke-arm64.exe" }
          )

          foreach ($test in $tests) {
            $exe = Join-Path $testDir $test.Out
            $libDir = Join-Path $native (Join-Path "lib" $test.LibDir)

            $cmd = 'call "' + $devcmd + '" -arch=' + $test.DevArch + ' -host_arch=x64 && clang-cl /nologo /std:c++20 /EHsc /MT /O2 /DNDEBUG /I "' + $native + '\include" "' + $main + '" /link /MACHINE:' + $test.Machine + ' /LIBPATH:"' + $libDir + '" v8_monolith.lib winmm.lib dbghelp.lib shlwapi.lib advapi32.lib ws2_32.lib /OUT:"' + $exe + '"'

            Write-Host "Smoke link test for $($test.Name):"
            Write-Host $cmd

            cmd.exe /c $cmd

            if ($LASTEXITCODE -ne 0) {
              throw "Native Release link smoke test failed for $($test.Name) with exit code $LASTEXITCODE"
            }

            Write-Host "Native Release link smoke test passed for $($test.Name): $exe"
          }

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-${{ env.VERSION }}-win-x64-arm64-release
          path: ${{ env.NUPKG }}
          if-no-files-found: error

      - name: Publish to GitHub Packages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        shell: pwsh
        run: |
          dotnet nuget push "$env:NUPKG" `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            --api-key "${{ secrets.GITHUB_TOKEN }}" `
            --skip-duplicate
