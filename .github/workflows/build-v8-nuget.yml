name: Build X.Script.V8 NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "14.3.127.5"
      v8_ref:
        description: "V8 git ref, tag, branch, or commit"
        required: true
        default: "14.3.127.5"
      publish:
        description: "Publish to NuGet.org"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v8-v*"

permissions:
  contents: read

jobs:
  build-v8-lib:
    name: Build V8 ${{ matrix.arch }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target_cpu: x64
            rid: win-x64
            build_dir: out.gn/win.x64.release
          - arch: arm64
            target_cpu: arm64
            rid: win-arm64
            build_dir: out.gn/win.arm64.release

    env:
      DEPOT_TOOLS_REPO: https://chromium.googlesource.com/chromium/tools/depot_tools.git
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"
      TARGET_CPU: ${{ matrix.target_cpu }}
      BUILD_DIR: ${{ matrix.build_dir }}
      RID: ${{ matrix.rid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve V8 ref
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $v8Ref = $tag.Replace("v8-v", "")
          }

          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "V8_REF=$v8Ref"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depot_tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config --global core.longpaths true
          git config --global depot-tools.allowGlobalGitConfig true

          $depotTools = Join-Path $env:GITHUB_WORKSPACE "depot_tools"

          if (Test-Path $depotTools) {
            Remove-Item $depotTools -Recurse -Force
          }

          git clone $env:DEPOT_TOOLS_REPO $depotTools
          $depotTools | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch V8 checkout
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          fetch --nohooks v8

      - name: Configure V8 checkout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"

          if (-not (Test-Path $v8Dir)) {
            throw "V8 checkout not found: $v8Dir"
          }

          git -C $v8Dir fetch origin --tags
          git -C $v8Dir checkout $env:V8_REF

          $gclientPath = Join-Path $env:GITHUB_WORKSPACE ".gclient"

          $gclientLines = @(
            'solutions = [',
            '  {',
            '    "name": "v8",',
            '    "url": "https://chromium.googlesource.com/v8/v8.git",',
            '    "managed": False,',
            '    "custom_deps": {',
            '      "v8/test/benchmarks/data": None,',
            '      "v8/test/mozilla/data": None,',
            '      "v8/test/test262/data": None,',
            '      "v8/test/wasm-js/data": None,',
            '    },',
            '  },',
            ']'
          )

          Set-Content -Path $gclientPath -Value $gclientLines -Encoding ASCII

          Write-Host ".gclient:"
          Get-Content $gclientPath

          Write-Host "V8 HEAD before sync:"
          git -C $v8Dir rev-parse HEAD
          git -C $v8Dir log -1 --oneline

      - name: Sync V8 dependencies
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          gclient sync -D --force --reset

          cd /d "%GITHUB_WORKSPACE%\v8"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Write GN args
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $buildDir = Join-Path $v8Dir $env:BUILD_DIR

          if (Test-Path $buildDir) {
            Remove-Item $buildDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          $argsLines = @(
            'target_os="win"',
            ('target_cpu="{0}"' -f $env:TARGET_CPU),
            ('v8_target_cpu="{0}"' -f $env:TARGET_CPU),
            'clang_use_chrome_plugins=false',
            'chrome_pgo_phase=false',
            'dcheck_always_on=false',
            'enable_rust=false',
            'is_cfi=false',
            'is_asan=false',
            'is_clang=true',
            'is_component_build=false',
            'is_debug=false',
            'strip_debug_info=true',
            'symbol_level=0',
            'treat_warnings_as_errors=false',
            'use_custom_libcxx=false',
            'use_rtti=false',
            'use_sysroot=false',
            'v8_deprecation_warnings=false',
            'v8_enable_builtins_optimization=true',
            'v8_enable_gdbjit=false',
            'v8_enable_i18n_support=false',
            'v8_enable_pointer_compression=false',
            'v8_enable_sandbox=false',
            'v8_enable_snapshot_compression=false',
            'v8_enable_temporal_support=false',
            'v8_enable_test_features=false',
            'v8_enable_webassembly=true',
            'v8_generate_external_defines_header=true',
            'v8_imminent_deprecation_warnings=false',
            'v8_monolithic=true',
            'v8_use_external_startup_data=false'
          )

          $args = $argsLines -join "`n"

          $argsPath = Join-Path $buildDir "args.gn"
          Set-Content -Path $argsPath -Value $args -Encoding ASCII

          Write-Host "args.gn:"
          Get-Content $argsPath

      - name: Build V8 monolith
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022
          set NINJA_STATUS=[%%f/%%t %%e] 

          cd /d "%GITHUB_WORKSPACE%\v8"

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" gen "%BUILD_DIR%"
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\third_party\ninja\ninja.exe" -C "%BUILD_DIR%" v8_monolith
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" args --list "%BUILD_DIR%" > "%BUILD_DIR%\args.full.txt"
          if errorlevel 1 exit /b 1

          if not exist "%BUILD_DIR%\obj\v8_monolith.lib" (
            echo v8_monolith.lib not found
            dir /s /b "%BUILD_DIR%\*v8_monolith.lib"
            exit /b 1
          )

      - name: Prepare architecture artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "v8-artifact"
          $includeDir = Join-Path $artifactRoot "include"
          $libDir = Join-Path $artifactRoot "lib\$env:RID"
          $buildInfoDir = Join-Path $artifactRoot "build-info\$env:RID"
          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $v8BuildDir = Join-Path $v8Dir $env:BUILD_DIR

          if (Test-Path $artifactRoot) {
            Remove-Item $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoDir | Out-Null

          Copy-Item "$v8Dir\include\*" $includeDir -Recurse -Force

          $generatedGnHeader = Join-Path $v8BuildDir "gen\include\v8-gn.h"
          if (Test-Path $generatedGnHeader) {
            Copy-Item $generatedGnHeader "$includeDir\v8-gn.h" -Force
          } else {
            throw "Generated v8-gn.h not found: $generatedGnHeader"
          }

          Copy-Item "$v8BuildDir\obj\v8_monolith.lib" "$libDir\v8_monolith.lib" -Force
          Copy-Item "$v8BuildDir\args.gn" "$buildInfoDir\args.gn" -Force
          Copy-Item "$v8BuildDir\args.full.txt" "$buildInfoDir\args.full.txt" -Force

          Write-Host "Prepared artifact layout:"
          Get-ChildItem $artifactRoot -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.rid }}
          path: ${{ github.workspace }}\v8-artifact
          if-no-files-found: error

  pack-nuget:
    name: Pack NuGet
    runs-on: windows-2022
    needs: build-v8-lib

    outputs:
      version: ${{ steps.resolve.outputs.version }}

    env:
      PACKAGE_ID: X.Script.V8
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget-packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Resolve package version
        id: resolve
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $version = $tag.Replace("v8-v", "")
            $v8Ref = $version
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "VERSION=$version"
          Write-Host "V8_REF=$v8Ref"

      - name: Download architecture artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}\downloaded-artifacts

      - name: Prepare NuGet layout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $buildNative = Join-Path $root "build\native"
          $includeDir = Join-Path $buildNative "include"
          $libX64Dir = Join-Path $buildNative "lib\win-x64"
          $libArm64Dir = Join-Path $buildNative "lib\win-arm64"
          $buildInfoX64Dir = Join-Path $buildNative "build-info\win-x64"
          $buildInfoArm64Dir = Join-Path $buildNative "build-info\win-arm64"

          $downloaded = Join-Path $env:GITHUB_WORKSPACE "downloaded-artifacts"
          $x64 = Join-Path $downloaded "v8-win-x64"
          $arm64 = Join-Path $downloaded "v8-win-arm64"

          if (-not (Test-Path $x64)) {
            throw "Missing x64 artifact: $x64"
          }

          if (-not (Test-Path $arm64)) {
            throw "Missing arm64 artifact: $arm64"
          }

          if (Test-Path $root) {
            Remove-Item $root -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $libArm64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoArm64Dir | Out-Null

          Copy-Item "$x64\include\*" $includeDir -Recurse -Force

          Copy-Item "$x64\lib\win-x64\v8_monolith.lib" "$libX64Dir\v8_monolith.lib" -Force
          Copy-Item "$arm64\lib\win-arm64\v8_monolith.lib" "$libArm64Dir\v8_monolith.lib" -Force

          Copy-Item "$x64\build-info\win-x64\*" $buildInfoX64Dir -Recurse -Force
          Copy-Item "$arm64\build-info\win-arm64\*" $buildInfoArm64Dir -Recurse -Force

          $propsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <LanguageStandard>stdcpp20</LanguageStandard>',
            '      <PreprocessorDefinitions>V8_GN_HEADER;%(PreprocessorDefinitions)</PreprocessorDefinitions>',
            '      <AdditionalIncludeDirectories>$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Configuration)'' == ''Debug''">',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreadedDebug</RuntimeLibrary>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Configuration)'' != ''Debug''">',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          $targetsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <PropertyGroup>',
            '    <_XScriptV8Rid Condition="''$(RuntimeIdentifier)'' != ''''">$(RuntimeIdentifier)</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(Platform)'' == ''x64''">win-x64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(Platform)'' == ''ARM64''">win-arm64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(PlatformTarget)'' == ''x64''">win-x64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(PlatformTarget)'' == ''ARM64''">win-arm64</_XScriptV8Rid>',
            '  </PropertyGroup>',
            '',
            '  <ItemDefinitionGroup Condition="''$(_XScriptV8Rid)'' == ''win-x64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '',
            '  <ItemDefinitionGroup Condition="''$(_XScriptV8Rid)'' == ''win-arm64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-arm64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>v8_monolith.lib;winmm.lib;dbghelp.lib;shlwapi.lib;advapi32.lib;ws2_32.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          Set-Content -Path "$buildNative\$env:PACKAGE_ID.props" -Value $propsLines -Encoding UTF8
          Set-Content -Path "$buildNative\$env:PACKAGE_ID.targets" -Value $targetsLines -Encoding UTF8

          $nuspecLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<package>',
            '  <metadata>',
            "    <id>$env:PACKAGE_ID</id>",
            "    <version>$env:VERSION</version>",
            '    <authors>X.Script</authors>',
            '    <owners>X.Script</owners>',
            '    <requireLicenseAcceptance>false</requireLicenseAcceptance>',
            '    <description>V8 native Windows x64 and ARM64 Release static libraries and headers for X.Script.</description>',
            '    <tags>v8 native javascript win-x64 win-arm64 clangcl msvc static-library</tags>',
            ('    <repository type="git" url="https://chromium.googlesource.com/v8/v8.git" commit="{0}" />' -f $env:V8_REF),
            '  </metadata>',
            '</package>'
          )

          Set-Content -Path "$root\$env:PACKAGE_ID.nuspec" -Value $nuspecLines -Encoding UTF8

          Write-Host "Generated props:"
          Get-Content "$buildNative\$env:PACKAGE_ID.props"

          Write-Host "Generated targets:"
          Get-Content "$buildNative\$env:PACKAGE_ID.targets"

          Write-Host "NuGet layout:"
          Get-ChildItem $root -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $outDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $nupkg = Join-Path $outDir "$env:PACKAGE_ID.$env:VERSION.nupkg"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          if (Test-Path $nupkg) {
            Remove-Item $nupkg -Force
          }

          Push-Location $root
          try {
            Compress-Archive -Path "$env:PACKAGE_ID.nuspec", "build" -DestinationPath $nupkg -Force
          } finally {
            Pop-Location
          }

          "NUPKG=$nupkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "NUPKG=$nupkg"

      - name: Verify NuGet content
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $required = @(
            "$env:PACKAGE_ID.nuspec",
            "build/native/$env:PACKAGE_ID.props",
            "build/native/$env:PACKAGE_ID.targets",
            "build/native/include/v8.h",
            "build/native/include/v8-gn.h",
            "build/native/include/libplatform/libplatform.h",
            "build/native/lib/win-x64/v8_monolith.lib",
            "build/native/lib/win-arm64/v8_monolith.lib",
            "build/native/build-info/win-x64/args.gn",
            "build/native/build-info/win-x64/args.full.txt",
            "build/native/build-info/win-arm64/args.gn",
            "build/native/build-info/win-arm64/args.full.txt"
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

          try {
            foreach ($item in $required) {
              $found = $false

              foreach ($entry in $zip.Entries) {
                if ($entry.FullName -eq $item) {
                  $found = $true
                  break
                }
              }

              if (-not $found) {
                throw "Missing required package entry: $item"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: PackageReference smoke test x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Get-PeMachineHex {
              param([Parameter(Mandatory = $true)][string] $Path)

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)][string] $Path,
                  [Parameter(Mandatory = $true)][string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
                  throw "PE machine mismatch. Expected $Expected, got $actual. File: $Path"
              }
          }

          $pkgDir = Join-Path $env:GITHUB_WORKSPACE "local-nuget-source"
          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-vcxproj-x64"

          if (Test-Path $pkgDir) {
            Remove-Item $pkgDir -Recurse -Force
          }

          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          Copy-Item $env:NUPKG $pkgDir -Force

          $main = Join-Path $testDir "main.cc"
          $vcxproj = Join-Path $testDir "SmokeV8.vcxproj"

          @'
          #include <v8.h>
          #include <cstdio>

          int main() {
              const char* version = v8::V8::GetVersion();
              if (version == nullptr || version[0] == 0) {
                  return 10;
              }

              std::puts(version);
              return 0;
          }
          '@ | Set-Content -Path $main -Encoding UTF8

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <Project DefaultTargets="Build" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemGroup Label="ProjectConfigurations">
              <ProjectConfiguration Include="Release|x64">
                <Configuration>Release</Configuration>
                <Platform>x64</Platform>
              </ProjectConfiguration>
            </ItemGroup>

            <PropertyGroup Label="Globals">
              <VCProjectVersion>17.0</VCProjectVersion>
              <Keyword>Win32Proj</Keyword>
              <ProjectGuid>{D3B9718D-7E20-4F94-BE07-92E2D02C3F01}</ProjectGuid>
              <RootNamespace>SmokeV8</RootNamespace>
              <WindowsTargetPlatformVersion>10.0</WindowsTargetPlatformVersion>
              <RestoreProjectStyle>PackageReference</RestoreProjectStyle>
            </PropertyGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.Default.props" />

            <PropertyGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|x64'" Label="Configuration">
              <ConfigurationType>Application</ConfigurationType>
              <UseDebugLibraries>false</UseDebugLibraries>
              <PlatformToolset>v143</PlatformToolset>
              <WholeProgramOptimization>true</WholeProgramOptimization>
              <CharacterSet>Unicode</CharacterSet>
            </PropertyGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.props" />

            <ItemDefinitionGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|x64'">
              <ClCompile>
                <WarningLevel>Level3</WarningLevel>
                <Optimization>MaxSpeed</Optimization>
              </ClCompile>
            </ItemDefinitionGroup>

            <ItemGroup>
              <ClCompile Include="main.cc" />
            </ItemGroup>

            <ItemGroup>
              <PackageReference Include="$env:PACKAGE_ID" Version="$env:VERSION" />
            </ItemGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.targets" />
          </Project>
          "@ | Set-Content -Path $vcxproj -Encoding UTF8

          msbuild $vcxproj `
            /restore `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RestoreSources="$pkgDir" `
            /p:RestoreNoCache=true `
            /p:RestorePackagesPath="$env:NUGET_PACKAGES"

          if ($LASTEXITCODE -ne 0) {
            throw "x64 PackageReference smoke build failed with exit code $LASTEXITCODE"
          }

          $exe = Join-Path $testDir "x64\Release\SmokeV8.exe"

          if (!(Test-Path $exe)) {
            $exe = Get-ChildItem $testDir -Filter "SmokeV8.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }

          Assert-PeMachine -Path $exe -Expected "0x8664"

          & $exe

          if ($LASTEXITCODE -ne 0) {
            throw "x64 PackageReference smoke runtime failed with exit code $LASTEXITCODE"
          }

      - name: PackageReference smoke test ARM64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Get-PeMachineHex {
              param([Parameter(Mandatory = $true)][string] $Path)

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)][string] $Path,
                  [Parameter(Mandatory = $true)][string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
                  throw "PE machine mismatch. Expected $Expected, got $actual. File: $Path"
              }
          }

          $pkgDir = Join-Path $env:GITHUB_WORKSPACE "local-nuget-source-arm64"
          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-vcxproj-arm64"

          if (Test-Path $pkgDir) {
            Remove-Item $pkgDir -Recurse -Force
          }

          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          Copy-Item $env:NUPKG $pkgDir -Force

          $main = Join-Path $testDir "main.cc"
          $vcxproj = Join-Path $testDir "SmokeV8.vcxproj"

          @'
          #include <v8.h>
          #include <cstdio>

          int main() {
              const char* version = v8::V8::GetVersion();
              if (version == nullptr || version[0] == 0) {
                  return 10;
              }

              std::puts(version);
              return 0;
          }
          '@ | Set-Content -Path $main -Encoding UTF8

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <Project DefaultTargets="Build" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemGroup Label="ProjectConfigurations">
              <ProjectConfiguration Include="Release|ARM64">
                <Configuration>Release</Configuration>
                <Platform>ARM64</Platform>
              </ProjectConfiguration>
            </ItemGroup>

            <PropertyGroup Label="Globals">
              <VCProjectVersion>17.0</VCProjectVersion>
              <Keyword>Win32Proj</Keyword>
              <ProjectGuid>{75C17D61-C78B-4601-BE89-EC8E541C6C19}</ProjectGuid>
              <RootNamespace>SmokeV8</RootNamespace>
              <WindowsTargetPlatformVersion>10.0</WindowsTargetPlatformVersion>
              <RestoreProjectStyle>PackageReference</RestoreProjectStyle>
            </PropertyGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.Default.props" />

            <PropertyGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|ARM64'" Label="Configuration">
              <ConfigurationType>Application</ConfigurationType>
              <UseDebugLibraries>false</UseDebugLibraries>
              <PlatformToolset>v143</PlatformToolset>
              <WholeProgramOptimization>true</WholeProgramOptimization>
              <CharacterSet>Unicode</CharacterSet>
            </PropertyGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.props" />

            <ItemDefinitionGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|ARM64'">
              <ClCompile>
                <WarningLevel>Level3</WarningLevel>
                <Optimization>MaxSpeed</Optimization>
              </ClCompile>
            </ItemDefinitionGroup>

            <ItemGroup>
              <ClCompile Include="main.cc" />
            </ItemGroup>

            <ItemGroup>
              <PackageReference Include="$env:PACKAGE_ID" Version="$env:VERSION" />
            </ItemGroup>

            <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.targets" />
          </Project>
          "@ | Set-Content -Path $vcxproj -Encoding UTF8

          msbuild $vcxproj `
            /restore `
            /m `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:RestoreSources="$pkgDir" `
            /p:RestoreNoCache=true `
            /p:RestorePackagesPath="$env:NUGET_PACKAGES"

          if ($LASTEXITCODE -ne 0) {
            throw "ARM64 PackageReference smoke build failed with exit code $LASTEXITCODE"
          }

          $exe = Join-Path $testDir "ARM64\Release\SmokeV8.exe"

          if (!(Test-Path $exe)) {
            $exe = Get-ChildItem $testDir -Filter "SmokeV8.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }

          Assert-PeMachine -Path $exe -Expected "0xAA64"

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: X.Script.V8-${{ env.VERSION }}
          path: ${{ env.NUPKG }}
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: windows-2022
    needs: pack-nuget

    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: X.Script.V8-${{ needs.pack-nuget.outputs.version }}
          path: nupkg

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $nupkg = Get-ChildItem -Path "nupkg" -Filter "*.nupkg" -Recurse | Select-Object -First 1

          if (-not $nupkg) {
            throw "No .nupkg found."
          }

          dotnet nuget push $nupkg.FullName `
            --source "https://api.nuget.org/v3/index.json" `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --skip-duplicate