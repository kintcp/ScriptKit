name: Build X.Script.V8 NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version"
        required: true
        default: "14.3.127.5"
      v8_ref:
        description: "V8 git ref, tag, branch, or commit"
        required: true
        default: "14.3.127.5"
      publish:
        description: "Publish to NuGet.org"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v8-v*"

permissions:
  contents: read

jobs:
  build-v8-lib:
    name: Build V8 ${{ matrix.arch }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target_cpu: x64
            rid: win-x64
            build_dir: out.gn/win.x64.release
            vc_arch: x64
            machine: X64
            pe_machine: "0x8664"
            clang_target: ""
          - arch: arm64
            target_cpu: arm64
            rid: win-arm64
            build_dir: out.gn/win.arm64.release
            vc_arch: arm64
            machine: ARM64
            pe_machine: "0xAA64"
            clang_target: "--target=aarch64-pc-windows-msvc"

    env:
      PACKAGE_ID: X.Script.V8
      DEPOT_TOOLS_REPO: https://chromium.googlesource.com/chromium/tools/depot_tools.git
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"
      TARGET_CPU: ${{ matrix.target_cpu }}
      BUILD_DIR: ${{ matrix.build_dir }}
      RID: ${{ matrix.rid }}
      VC_ARCH: ${{ matrix.vc_arch }}
      MACHINE: ${{ matrix.machine }}
      PE_MACHINE: ${{ matrix.pe_machine }}
      CLANG_TARGET: ${{ matrix.clang_target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve V8 ref
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $v8Ref = $tag.Replace("v8-v", "")
          }

          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "V8_REF=$v8Ref"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depot_tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config --global core.longpaths true
          git config --global depot-tools.allowGlobalGitConfig true

          $depotTools = Join-Path $env:GITHUB_WORKSPACE "depot_tools"

          if (Test-Path $depotTools) {
            Remove-Item $depotTools -Recurse -Force
          }

          git clone $env:DEPOT_TOOLS_REPO $depotTools
          $depotTools | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch V8 checkout
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          fetch --nohooks v8

      - name: Configure V8 checkout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"

          if (-not (Test-Path $v8Dir)) {
            throw "V8 checkout not found: $v8Dir"
          }

          git -C $v8Dir fetch origin --tags
          git -C $v8Dir checkout $env:V8_REF

          $gclientPath = Join-Path $env:GITHUB_WORKSPACE ".gclient"

          $gclientLines = @(
            'solutions = [',
            '  {',
            '    "name": "v8",',
            '    "url": "https://chromium.googlesource.com/v8/v8.git",',
            '    "managed": False,',
            '    "custom_deps": {',
            '      "v8/test/benchmarks/data": None,',
            '      "v8/test/mozilla/data": None,',
            '      "v8/test/test262/data": None,',
            '      "v8/test/wasm-js/data": None,',
            '    },',
            '  },',
            ']'
          )

          Set-Content -Path $gclientPath -Value $gclientLines -Encoding ASCII

          Write-Host ".gclient:"
          Get-Content $gclientPath

          Write-Host "V8 HEAD before sync:"
          git -C $v8Dir rev-parse HEAD
          git -C $v8Dir log -1 --oneline

      - name: Sync V8 dependencies
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022

          cd /d "%GITHUB_WORKSPACE%"
          gclient sync -D --force --reset

          cd /d "%GITHUB_WORKSPACE%\v8"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Write GN args
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $buildDir = Join-Path $v8Dir $env:BUILD_DIR

          if (Test-Path $buildDir) {
            Remove-Item $buildDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          $argsLines = @(
            'target_os="win"',
            ('target_cpu="{0}"' -f $env:TARGET_CPU),
            ('v8_target_cpu="{0}"' -f $env:TARGET_CPU),
            'clang_use_chrome_plugins=false',
            'chrome_pgo_phase=false',
            'dcheck_always_on=false',
            'enable_rust=false',
            'is_cfi=false',
            'is_asan=false',
            'is_clang=true',
            'is_component_build=false',
            'is_debug=false',
            'strip_debug_info=true',
            'symbol_level=0',
            'treat_warnings_as_errors=false',
            'use_custom_libcxx=false',
            'use_rtti=false',
            'use_sysroot=false',
            'v8_deprecation_warnings=false',
            'v8_enable_builtins_optimization=true',
            'v8_enable_gdbjit=false',
            'v8_enable_i18n_support=false',
            'v8_enable_pointer_compression=false',
            'v8_enable_sandbox=false',
            'v8_enable_snapshot_compression=false',
            'v8_enable_temporal_support=false',
            'v8_enable_test_features=false',
            'v8_enable_webassembly=true',
            'v8_generate_external_defines_header=true',
            'v8_imminent_deprecation_warnings=false',
            'v8_monolithic=true',
            'v8_monolithic_for_shared_library=true',
            'v8_use_external_startup_data=false'
          )

          $args = $argsLines -join "`n"

          $argsPath = Join-Path $buildDir "args.gn"
          Set-Content -Path $argsPath -Value $args -Encoding ASCII

          Write-Host "args.gn:"
          Get-Content $argsPath

      - name: Build V8 monolith
        shell: cmd
        run: |
          set PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022
          set NINJA_STATUS=[%%f/%%t %%e] 

          cd /d "%GITHUB_WORKSPACE%\v8"

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" gen "%BUILD_DIR%"
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\third_party\ninja\ninja.exe" -C "%BUILD_DIR%" v8_monolith
          if errorlevel 1 exit /b 1

          "%GITHUB_WORKSPACE%\v8\buildtools\win\gn.exe" args --list "%BUILD_DIR%" > "%BUILD_DIR%\args.full.txt"
          if errorlevel 1 exit /b 1

          if not exist "%BUILD_DIR%\obj\v8_monolith.lib" (
            echo v8_monolith.lib not found
            dir /s /b "%BUILD_DIR%\*v8_monolith.lib"
            exit /b 1
          )

      - name: Build V8 DLL from monolith
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Get-PeMachineHex {
              param([Parameter(Mandatory = $true)][string] $Path)

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)][string] $Path,
                  [Parameter(Mandatory = $true)][string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
                  throw "PE machine mismatch. Expected $Expected, got $actual. File: $Path"
              }
          }

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $v8BuildDir = Join-Path $v8Dir $env:BUILD_DIR
          $monolith = Join-Path $v8BuildDir "obj\v8_monolith.lib"

          if (!(Test-Path $monolith)) {
            throw "Missing v8_monolith.lib: $monolith"
          }

          $dllRoot = Join-Path $env:GITHUB_WORKSPACE "v8-dll\$env:RID"
          $dllBuildDir = Join-Path $dllRoot "build"
          $dllOutDir = Join-Path $dllRoot "bin"
          $libOutDir = Join-Path $dllRoot "lib"

          if (Test-Path $dllRoot) {
            Remove-Item $dllRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $dllBuildDir | Out-Null
          New-Item -ItemType Directory -Force -Path $dllOutDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libOutDir | Out-Null

          $dllName = "$env:PACKAGE_ID.dll"
          $libName = "$env:PACKAGE_ID.lib"
          $defName = "$env:PACKAGE_ID.def"
          $expName = "$env:PACKAGE_ID.exp"

          $dllPath = Join-Path $dllOutDir $dllName
          $implibPath = Join-Path $libOutDir $libName
          $defPath = Join-Path $dllBuildDir $defName
          $dllMain = Join-Path $dllBuildDir "dllmain.cc"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $devcmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"

          @'
          #define WIN32_LEAN_AND_MEAN
          #include <windows.h>

          BOOL WINAPI DllMain(HINSTANCE, DWORD, LPVOID) {
              return TRUE;
          }
          '@ | Set-Content -Path $dllMain -Encoding UTF8

          $dumpCmd = Join-Path $dllBuildDir "dump-symbols.cmd"

          @"
          @echo off
          call "$devcmd" -arch=$env:VC_ARCH -host_arch=x64 >nul
          dumpbin /nologo /linkermember:1 "$monolith"
          dumpbin /nologo /linkermember:2 "$monolith"
          "@ | Set-Content -Path $dumpCmd -Encoding ASCII

          Write-Host "Collecting symbols from v8_monolith.lib..."
          $dumpOutput = & cmd.exe /c "`"$dumpCmd`""

          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin failed with exit code $LASTEXITCODE"
          }

          $dumpLog = Join-Path $dllBuildDir "dump-symbols.txt"
          $dumpOutput | Set-Content -Path $dumpLog -Encoding UTF8

          $symbols = [System.Collections.Generic.SortedSet[string]]::new([System.StringComparer]::Ordinal)

          foreach ($line in $dumpOutput) {
            $matches = [regex]::Matches($line, '(\?\S+@(?:v8|cppgc)@@\S*)')

            foreach ($match in $matches) {
              $symbol = $match.Groups[1].Value.Trim()
              $symbol = $symbol.TrimEnd(',')
              $symbol = $symbol.TrimEnd(';')

              if ($symbol.Length -eq 0) {
                continue
              }

              if ($symbol.StartsWith("__imp_")) {
                continue
              }

              $null = $symbols.Add($symbol)
            }
          }

          if ($symbols.Count -lt 100) {
            Write-Host "Export symbol count: $($symbols.Count)"
            Write-Host "Dump log: $dumpLog"
            throw "Too few V8 export symbols collected. The .def generation is probably wrong."
          }

          $defLines = New-Object System.Collections.Generic.List[string]
          $defLines.Add("LIBRARY $dllName")
          $defLines.Add("EXPORTS")

          foreach ($symbol in $symbols) {
            $defLines.Add("  $symbol")
          }

          Set-Content -Path $defPath -Value $defLines -Encoding ASCII

          Write-Host "Generated exports:"
          Write-Host "  DEF: $defPath"
          Write-Host "  Count: $($symbols.Count)"

          $linkCmd = Join-Path $dllBuildDir "link-dll.cmd"

          $targetPrefix = ""
          if ($env:CLANG_TARGET -and $env:CLANG_TARGET.Trim().Length -gt 0) {
            $targetPrefix = "$env:CLANG_TARGET "
          }

          @"
          @echo off
          call "$devcmd" -arch=$env:VC_ARCH -host_arch=x64
          if errorlevel 1 exit /b 1

          clang-cl $targetPrefix/nologo /LD /std:c++20 /EHsc /MT /O2 /DNDEBUG "$dllMain" /link /NOLOGO /DLL /MACHINE:$env:MACHINE /WHOLEARCHIVE:"$monolith" /DEF:"$defPath" /OUT:"$dllPath" /IMPLIB:"$implibPath" winmm.lib dbghelp.lib shlwapi.lib advapi32.lib ws2_32.lib
          if errorlevel 1 exit /b 1
          "@ | Set-Content -Path $linkCmd -Encoding ASCII

          Write-Host "Linking $dllName..."
          & cmd.exe /c "`"$linkCmd`""

          if ($LASTEXITCODE -ne 0) {
            throw "Linking $dllName failed with exit code $LASTEXITCODE"
          }

          if (!(Test-Path $dllPath)) {
            throw "DLL not created: $dllPath"
          }

          if (!(Test-Path $implibPath)) {
            throw "Import lib not created: $implibPath"
          }

          Assert-PeMachine -Path $dllPath -Expected $env:PE_MACHINE

          $dumpDependentsCmd = Join-Path $dllBuildDir "dump-dependents.cmd"

          @"
          @echo off
          call "$devcmd" -arch=$env:VC_ARCH -host_arch=x64 >nul
          dumpbin /nologo /dependents "$dllPath"
          "@ | Set-Content -Path $dumpDependentsCmd -Encoding ASCII

          $dependents = & cmd.exe /c "`"$dumpDependentsCmd`""
          $dependentsLog = Join-Path $dllBuildDir "dependents.txt"
          $dependents | Set-Content -Path $dependentsLog -Encoding UTF8

          Write-Host "DLL dependents:"
          $dependents | ForEach-Object { Write-Host $_ }

          $badDependentPatterns = @(
            "v8_.*\.dll",
            "icu.*\.dll",
            "msvcp.*\.dll",
            "vcruntime.*\.dll",
            "ucrtbase\.dll"
          )

          foreach ($pattern in $badDependentPatterns) {
            if ($dependents -match $pattern) {
              throw "Unexpected dynamic dependency matching '$pattern'. See $dependentsLog"
            }
          }

          $expPath = Join-Path $libOutDir $expName
          if (Test-Path $expPath) {
            Remove-Item $expPath -Force
          }

          Write-Host "Built DLL files:"
          Get-ChildItem $dllRoot -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Prepare architecture artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "v8-artifact"
          $includeDir = Join-Path $artifactRoot "include"
          $binDir = Join-Path $artifactRoot "bin\$env:RID"
          $libDir = Join-Path $artifactRoot "lib\$env:RID"
          $buildInfoDir = Join-Path $artifactRoot "build-info\$env:RID"

          $v8Dir = Join-Path $env:GITHUB_WORKSPACE "v8"
          $v8BuildDir = Join-Path $v8Dir $env:BUILD_DIR
          $dllRoot = Join-Path $env:GITHUB_WORKSPACE "v8-dll\$env:RID"

          if (Test-Path $artifactRoot) {
            Remove-Item $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoDir | Out-Null

          Copy-Item "$v8Dir\include\*" $includeDir -Recurse -Force

          $generatedGnHeader = Join-Path $v8BuildDir "gen\include\v8-gn.h"
          if (Test-Path $generatedGnHeader) {
            Copy-Item $generatedGnHeader "$includeDir\v8-gn.h" -Force
          } else {
            throw "Generated v8-gn.h not found: $generatedGnHeader"
          }

          Copy-Item "$dllRoot\bin\$env:PACKAGE_ID.dll" "$binDir\$env:PACKAGE_ID.dll" -Force
          Copy-Item "$dllRoot\lib\$env:PACKAGE_ID.lib" "$libDir\$env:PACKAGE_ID.lib" -Force

          Copy-Item "$v8BuildDir\args.gn" "$buildInfoDir\args.gn" -Force
          Copy-Item "$v8BuildDir\args.full.txt" "$buildInfoDir\args.full.txt" -Force
          Copy-Item "$dllRoot\build\$env:PACKAGE_ID.def" "$buildInfoDir\$env:PACKAGE_ID.def" -Force
          Copy-Item "$dllRoot\build\dependents.txt" "$buildInfoDir\dependents.txt" -Force
          Copy-Item "$dllRoot\build\dump-symbols.txt" "$buildInfoDir\dump-symbols.txt" -Force

          Write-Host "Prepared artifact layout:"
          Get-ChildItem $artifactRoot -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.rid }}
          path: ${{ github.workspace }}\v8-artifact
          if-no-files-found: error

  pack-nuget:
    name: Pack NuGet
    runs-on: windows-2022
    needs: build-v8-lib

    outputs:
      version: ${{ steps.resolve.outputs.version }}

    env:
      PACKAGE_ID: X.Script.V8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve package version
        id: resolve
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
            $v8Ref = "${{ github.event.inputs.v8_ref }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $version = $tag.Replace("v8-v", "")
            $v8Ref = $version
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "V8_REF=$v8Ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "VERSION=$version"
          Write-Host "V8_REF=$v8Ref"

      - name: Download architecture artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}\downloaded-artifacts

      - name: Prepare NuGet layout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $buildNative = Join-Path $root "build\native"

          $includeDir = Join-Path $buildNative "include"

          $binX64Dir = Join-Path $buildNative "bin\win-x64"
          $binArm64Dir = Join-Path $buildNative "bin\win-arm64"

          $libX64Dir = Join-Path $buildNative "lib\win-x64"
          $libArm64Dir = Join-Path $buildNative "lib\win-arm64"

          $runtimeX64Dir = Join-Path $root "runtimes\win-x64\native"
          $runtimeArm64Dir = Join-Path $root "runtimes\win-arm64\native"

          $buildInfoX64Dir = Join-Path $buildNative "build-info\win-x64"
          $buildInfoArm64Dir = Join-Path $buildNative "build-info\win-arm64"

          $downloaded = Join-Path $env:GITHUB_WORKSPACE "downloaded-artifacts"
          $x64 = Join-Path $downloaded "v8-win-x64"
          $arm64 = Join-Path $downloaded "v8-win-arm64"

          if (-not (Test-Path $x64)) {
            throw "Missing x64 artifact: $x64"
          }

          if (-not (Test-Path $arm64)) {
            throw "Missing arm64 artifact: $arm64"
          }

          if (Test-Path $root) {
            Remove-Item $root -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null

          New-Item -ItemType Directory -Force -Path $binX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $binArm64Dir | Out-Null

          New-Item -ItemType Directory -Force -Path $libX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $libArm64Dir | Out-Null

          New-Item -ItemType Directory -Force -Path $runtimeX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $runtimeArm64Dir | Out-Null

          New-Item -ItemType Directory -Force -Path $buildInfoX64Dir | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInfoArm64Dir | Out-Null

          Copy-Item "$x64\include\*" $includeDir -Recurse -Force

          Copy-Item "$x64\bin\win-x64\$env:PACKAGE_ID.dll" "$binX64Dir\$env:PACKAGE_ID.dll" -Force
          Copy-Item "$arm64\bin\win-arm64\$env:PACKAGE_ID.dll" "$binArm64Dir\$env:PACKAGE_ID.dll" -Force

          Copy-Item "$x64\lib\win-x64\$env:PACKAGE_ID.lib" "$libX64Dir\$env:PACKAGE_ID.lib" -Force
          Copy-Item "$arm64\lib\win-arm64\$env:PACKAGE_ID.lib" "$libArm64Dir\$env:PACKAGE_ID.lib" -Force

          Copy-Item "$x64\bin\win-x64\$env:PACKAGE_ID.dll" "$runtimeX64Dir\$env:PACKAGE_ID.dll" -Force
          Copy-Item "$arm64\bin\win-arm64\$env:PACKAGE_ID.dll" "$runtimeArm64Dir\$env:PACKAGE_ID.dll" -Force

          Copy-Item "$x64\build-info\win-x64\*" $buildInfoX64Dir -Recurse -Force
          Copy-Item "$arm64\build-info\win-arm64\*" $buildInfoArm64Dir -Recurse -Force

          $propsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <LanguageStandard>stdcpp20</LanguageStandard>',
            '      <PreprocessorDefinitions>USING_V8_SHARED;V8_GN_HEADER;%(PreprocessorDefinitions)</PreprocessorDefinitions>',
            '      <AdditionalIncludeDirectories>$(MSBuildThisFileDirectory)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Configuration)'' == ''Debug''">',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreadedDebug</RuntimeLibrary>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Configuration)'' != ''Debug''">',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )

          $targetsLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <PropertyGroup>',
            '    <_XScriptV8Rid Condition="''$(RuntimeIdentifier)'' != ''''">$(RuntimeIdentifier)</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(Platform)'' == ''x64''">win-x64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(Platform)'' == ''ARM64''">win-arm64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(PlatformTarget)'' == ''x64''">win-x64</_XScriptV8Rid>',
            '    <_XScriptV8Rid Condition="''$(_XScriptV8Rid)'' == '''' and ''$(PlatformTarget)'' == ''ARM64''">win-arm64</_XScriptV8Rid>',
            '  </PropertyGroup>',
            '',
            '  <ItemDefinitionGroup Condition="''$(_XScriptV8Rid)'' == ''win-x64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-x64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>X.Script.V8.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '',
            '  <ItemGroup Condition="''$(_XScriptV8Rid)'' == ''win-x64''">',
            '    <None Include="$(MSBuildThisFileDirectory)bin\win-x64\X.Script.V8.dll">',
            '      <Link>X.Script.V8.dll</Link>',
            '      <CopyToOutputDirectory>PreserveNewest</CopyToOutputDirectory>',
            '    </None>',
            '  </ItemGroup>',
            '',
            '  <ItemDefinitionGroup Condition="''$(_XScriptV8Rid)'' == ''win-arm64''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(MSBuildThisFileDirectory)lib\win-arm64;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>X.Script.V8.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '',
            '  <ItemGroup Condition="''$(_XScriptV8Rid)'' == ''win-arm64''">',
            '    <None Include="$(MSBuildThisFileDirectory)bin\win-arm64\X.Script.V8.dll">',
            '      <Link>X.Script.V8.dll</Link>',
            '      <CopyToOutputDirectory>PreserveNewest</CopyToOutputDirectory>',
            '    </None>',
            '  </ItemGroup>',
            '</Project>'
          )

          Set-Content -Path "$buildNative\$env:PACKAGE_ID.props" -Value $propsLines -Encoding UTF8
          Set-Content -Path "$buildNative\$env:PACKAGE_ID.targets" -Value $targetsLines -Encoding UTF8

          $nuspecLines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<package>',
            '  <metadata>',
            "    <id>$env:PACKAGE_ID</id>",
            "    <version>$env:VERSION</version>",
            '    <authors>X.Script</authors>',
            '    <owners>X.Script</owners>',
            '    <requireLicenseAcceptance>false</requireLicenseAcceptance>',
            '    <description>V8 native Windows x64 and ARM64 dynamic libraries, import libraries, and headers for X.Script. Built from v8_monolith with static dependencies where possible.</description>',
            '    <tags>v8 native javascript win-x64 win-arm64 clangcl msvc dll dynamic-library import-library</tags>',
            ('    <repository type="git" url="https://chromium.googlesource.com/v8/v8.git" commit="{0}" />' -f $env:V8_REF),
            '  </metadata>',
            '</package>'
          )

          Set-Content -Path "$root\$env:PACKAGE_ID.nuspec" -Value $nuspecLines -Encoding UTF8

          Write-Host "Generated props:"
          Get-Content "$buildNative\$env:PACKAGE_ID.props"

          Write-Host "Generated targets:"
          Get-Content "$buildNative\$env:PACKAGE_ID.targets"

          Write-Host "NuGet layout:"
          Get-ChildItem $root -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $outDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $root = Join-Path $env:GITHUB_WORKSPACE "nuget-root"
          $nupkg = Join-Path $outDir "$env:PACKAGE_ID.$env:VERSION.nupkg"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          if (Test-Path $nupkg) {
            Remove-Item $nupkg -Force
          }

          Push-Location $root
          try {
            Compress-Archive -Path "$env:PACKAGE_ID.nuspec", "build", "runtimes" -DestinationPath $nupkg -Force
          } finally {
            Pop-Location
          }

          "NUPKG=$nupkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "NUPKG=$nupkg"

      - name: Verify NuGet content
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $required = @(
            "$env:PACKAGE_ID.nuspec",
            "build/native/$env:PACKAGE_ID.props",
            "build/native/$env:PACKAGE_ID.targets",
            "build/native/include/v8.h",
            "build/native/include/v8-gn.h",
            "build/native/include/libplatform/libplatform.h",

            "build/native/lib/win-x64/$env:PACKAGE_ID.lib",
            "build/native/bin/win-x64/$env:PACKAGE_ID.dll",
            "runtimes/win-x64/native/$env:PACKAGE_ID.dll",

            "build/native/lib/win-arm64/$env:PACKAGE_ID.lib",
            "build/native/bin/win-arm64/$env:PACKAGE_ID.dll",
            "runtimes/win-arm64/native/$env:PACKAGE_ID.dll",

            "build/native/build-info/win-x64/args.gn",
            "build/native/build-info/win-x64/args.full.txt",
            "build/native/build-info/win-x64/$env:PACKAGE_ID.def",
            "build/native/build-info/win-x64/dependents.txt",

            "build/native/build-info/win-arm64/args.gn",
            "build/native/build-info/win-arm64/args.full.txt",
            "build/native/build-info/win-arm64/$env:PACKAGE_ID.def",
            "build/native/build-info/win-arm64/dependents.txt"
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:NUPKG)

          try {
            foreach ($item in $required) {
              $found = $false

              foreach ($entry in $zip.Entries) {
                if ($entry.FullName -eq $item) {
                  $found = $true
                  break
                }
              }

              if (-not $found) {
                throw "Missing required package entry: $item"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: Native C++ DLL smoke test x64 from packed NuGet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Get-PeMachineHex {
              param([Parameter(Mandatory = $true)][string] $Path)

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)][string] $Path,
                  [Parameter(Mandatory = $true)][string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
                  throw "PE machine mismatch. Expected $Expected, got $actual. File: $Path"
              }
          }

          $testDir = Join-Path $env:GITHUB_WORKSPACE "smoke-test-x64"
          $extractDir = Join-Path $testDir "package"
          $main = Join-Path $testDir "main.cc"
          $exe = Join-Path $testDir "v8-smoke-x64.exe"

          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $testDir | Out-Null
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null

          Expand-Archive -Path $env:NUPKG -DestinationPath $extractDir -Force

          $native = Join-Path $extractDir "build\native"
          $includeDir = Join-Path $native "include"
          $libDir = Join-Path $native "lib\win-x64"
          $binDir = Join-Path $native "bin\win-x64"

          $importLib = Join-Path $libDir "$env:PACKAGE_ID.lib"
          $dll = Join-Path $binDir "$env:PACKAGE_ID.dll"

          if (!(Test-Path $includeDir)) {
            throw "Missing include dir from nupkg: $includeDir"
          }

          if (!(Test-Path $importLib)) {
            throw "Missing x64 import lib from nupkg: $importLib"
          }

          if (!(Test-Path $dll)) {
            throw "Missing x64 DLL from nupkg: $dll"
          }

          @'
          #include <v8.h>
          #include <cstdio>

          int main() {
              const char* version = v8::V8::GetVersion();
              if (version == nullptr || version[0] == 0) {
                  return 10;
              }

              std::puts(version);
              return 0;
          }
          '@ | Set-Content -Path $main -Encoding UTF8

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $devcmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"

          $buildCmd = Join-Path $testDir "build-x64.cmd"

          @"
          @echo off
          call "$devcmd" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b 1

          clang-cl /nologo /std:c++20 /EHsc /MT /O2 /DNDEBUG /DUSING_V8_SHARED /DV8_GN_HEADER /I "$includeDir" "$main" /link /LIBPATH:"$libDir" X.Script.V8.lib /OUT:"$exe"
          if errorlevel 1 exit /b 1
          "@ | Set-Content -Path $buildCmd -Encoding ASCII

          & cmd.exe /c "`"$buildCmd`""

          if ($LASTEXITCODE -ne 0) {
            throw "Native x64 DLL smoke test link failed with exit code $LASTEXITCODE"
          }

          Copy-Item $dll (Join-Path $testDir "$env:PACKAGE_ID.dll") -Force

          Assert-PeMachine -Path $exe -Expected "0x8664"
          Assert-PeMachine -Path (Join-Path $testDir "$env:PACKAGE_ID.dll") -Expected "0x8664"

          & $exe

          if ($LASTEXITCODE -ne 0) {
            throw "Native x64 DLL smoke test runtime failed with exit code $LASTEXITCODE"
          }

      - name: Native C++ DLL smoke test ARM64 from packed NuGet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Get-PeMachineHex {
              param([Parameter(Mandatory = $true)][string] $Path)

              $bytes = [System.IO.File]::ReadAllBytes($Path)
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)

              return "0x{0:X4}" -f $machine
          }

          function Assert-PeMachine {
              param(
                  [Parameter(Mandatory = $true)][string] $Path,
                  [Parameter(Mandatory = $true)][string] $Expected
              )

              if (!(Test-Path $Path)) {
                  throw "Missing PE file: $Path"
              }

              $actual = Get-PeMachineHex -Path $Path
              Write-Host "$Path -> $actual"

              if ($actual -ne $Expected) {
